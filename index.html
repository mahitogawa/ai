<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIパスポート最強アプリ【決定版】</title>
<style>
/* Mahito専用：フォントサイズは変更せず、見やすさ重視 */
body { font-family:sans-serif; background:#f4f7f6; padding:15px; margin:0; font-size: 22px; }
.container { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
h2 { font-size:26px; color:#1e293b; border-left:12px solid #2563eb; padding-left:15px; }
.menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.menu button { background:#111827; color:#fff; font-size:16px; padding:12px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; }
#flagBtn { background:#f59e0b; color:#fff; margin-bottom: 15px; padding:20px; font-size:22px; border-radius:12px; border:none; width:100%; font-weight:bold; cursor:pointer; }
.is-flagged { background:#ef4444 !important; }
#question { font-size:26px; font-weight:bold; margin:20px 0; background:#f8f9fa; padding:20px; border-radius:12px; border:1px solid #e2e8f0; }
button.choice { padding:22px; margin:10px 0; width:100%; border-radius:15px; border:2px solid #cbd5e1; background:#fff; font-size:22px; font-weight:bold; text-align:left; cursor:pointer; }
.correct { background:#d1fae5 !important; border-color:#10b981 !important; color:#064e3b; }
.wrong { background:#fee2e2 !important; border-color:#ef4444 !important; color:#7f1d1d; }
#result { margin-top:15px; font-weight:bold; font-size:22px; padding:15px; border-radius:10px; display:none; border:2px solid #ddd; }
#nextBtn { background:#2563eb; color:#fff; padding:22px; font-size:24px; width:100%; border:none; border-radius:15px; font-weight:bold; cursor:pointer; display:none; margin-top:20px; }
#final-screen { display:none; text-align: center; }
.review-box { text-align: left; background: #fff1f2; padding: 15px; margin-top: 20px; border-radius: 10px; border-left: 8px solid #ef4444; }
.review-item { margin-bottom: 20px; border-bottom: 1px solid #fda4af; padding-bottom: 10px; font-size: 18px; }

/* ===== 表紙（スタート画面）専用CSS ===== */
#start-screen {
  display: block;
  max-width: 700px;
  margin: auto;
  text-align: center;
  background: #0f172a;
  border-radius: 20px;
  padding: 30px 20px 40px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
#start-screen .cover-title {
  color: #f1f5f9;
  font-size: 18px;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  opacity: 0.7;
}
#start-screen .cover-image-wrapper {
  background: linear-gradient(135deg, #1e3a5f, #0f172a);
  border: 3px solid #ef4444;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: 0 0 30px rgba(239,68,68,0.35);
}
#start-screen .cover-image-wrapper img {
  width: 100%;
  max-width: 520px;
  height: auto;
  border-radius: 10px;
  display: block;
  margin: auto;
}
/* 画像がない場合の代替表示 */
#start-screen .cover-fallback {
  padding: 30px 10px;
  color: #f1f5f9;
}
#start-screen .cover-fallback .big-title {
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #fbbf24;
}
#start-screen .cover-fallback .sub {
  font-size: 18px;
  color: #94a3b8;
}
#start-btn {
  display: block;
  width: 90%;
  max-width: 420px;
  margin: 0 auto 16px;
  padding: 24px;
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #ef4444, #f59e0b);
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(239,68,68,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
#start-btn:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(239,68,68,0.6); }
#start-btn:active { transform: scale(0.97); }
#cheat-btn {
  display: block;
  width: 90%;
  max-width: 420px;
  margin: 12px auto 0;
  padding: 24px;
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(37,99,235,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
#cheat-btn:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(37,99,235,0.6); }
#cheat-btn:active { transform: scale(0.97); }
#start-screen .edition-note {
  color: #64748b;
  font-size: 16px;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- ===== 表紙（スタート画面）===== -->
<div id="start-screen">
  <p class="cover-title">Mahito's Edition 2026</p>
  <div class="cover-image-wrapper">
    <!-- 画像ファイルをGitHubに置いていない場合は下の fallback が表示されます -->
    <img src="image_0aff13.png" alt="AIパスポート模試" 
         onerror="this.style.display='none'; document.getElementById('cover-fallback').style.display='block';">
    <div id="cover-fallback" class="cover-fallback" style="display:none;">
      <div class="big-title">🐱 生成AIパスポート</div>
      <div class="big-title">最新124問搭載！</div>
      <div class="sub">2026年新シラバス対応 ／ 4択形式</div>
    </div>
  </div>
  <button id="start-btn" onclick="startQuiz()">🐱 練習問題をはじめる</button>
  <button onclick="showCheat()" id="cheat-btn">📖 略語チートシートを見る</button>
  <p class="edition-note">全124問収録 ／ 毎回60問ランダム出題 ／ キジトラ応援団🐈</p>
  <p id="gc-visits" style="color:#64748b; font-size:16px; margin-top:4px;">👀 訪問者数：読み込み中...</p>
  <script>
    fetch('https://mahito.goatcounter.com/counter/TOTAL.json')
      .then(r => r.json())
      .then(d => { document.getElementById('gc-visits').textContent = '👀 訪問者数：' + d.count + ' 人'; })
      .catch(() => { document.getElementById('gc-visits').textContent = '👀 訪問者数：集計中'; });
  </script>
  <div style="margin-top:20px; background:#1e293b; border-radius:12px; padding:20px 24px; text-align:center; font-size:22px; font-weight:bold; color:#fbbf24; letter-spacing:0.05em;">
    猫と学べるAIパスポート最強ドリル🐈
  </div>
</div>

<!-- ===== チートシート画面 ===== -->
<div id="cheat-screen" style="display:none; max-width:700px; margin:auto; background:#0f172a; border-radius:20px; padding:24px 20px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div style="color:#fbbf24; font-size:22px; font-weight:bold;">📖 略語チートシート</div>
    <button onclick="hideCheat()" style="background:#334155; color:#fff; border:none; border-radius:20px; padding:8px 20px; font-size:16px; cursor:pointer;">← 戻る</button>
  </div>
  <div style="color:#94a3b8; font-size:18px; margin-bottom:16px;">2026年新シラバス対応 ／ タップで解説を表示</div>
  <div id="cheat-list"></div>
</div>

<!-- ===== クイズ画面（元のコードそのまま）===== -->
<div id="game-screen" class="container" style="display:none;">
    <h2>AIパスポート実戦</h2>
    <div class="menu">
        <button onclick="retryWrong()">❌ミス</button>
        <button onclick="retryFlagged()">🚩フラグ</button>
        <button onclick="retryAll()">🔄リセット</button>
    </div>
    <div id="progress" style="font-weight:bold; color:#64748b;"></div>
    <div id="timer" style="font-weight:bold; color:#ef4444; font-size:22px; margin-bottom:15px;"></div>
    <button id="flagBtn" onclick="toggleFlag()">★ フラグを立てる</button>
    <div id="question"></div>
    <div id="answers"></div>
    <div id="result"></div>
    <button id="nextBtn" onclick="next()">次の問題へ ➔</button>
</div>

<div id="final-screen" class="container">
    <h2>試験結果発表</h2>
    <div id="final-score" style="font-size:60px; font-weight:bold; color:#2563eb;"></div>
    <div id="judgement" style="margin:15px auto; max-width:500px; padding:20px; border-radius:12px; font-size:22px; font-weight:bold;"></div>
    <div style="margin:10px auto 20px; max-width:500px;">
      <div style="display:flex; justify-content:space-between; font-size:16px; color:#64748b; margin-bottom:6px;">
        <span>正解率</span><span id="score-bar-pct"></span>
      </div>
      <div style="background:#e2e8f0; border-radius:50px; height:22px; overflow:hidden;">
        <div id="score-bar-fill" style="height:100%; width:0%; border-radius:50px; transition:width 1s ease;"></div>
      </div>
    </div>
    <div id="review-area" class="review-box">
        <h3>📋 復習リスト（間違えた問題）</h3>
        <div id="review-list"></div>
    </div>
    <button onclick="retryAll()" style="background:#27ae60; color:#fff; padding:25px; width:100%; border:none; border-radius:15px; font-weight:bold; font-size:22px; cursor:pointer; margin-top:30px;">🔄 最初からやり直す</button>
</div>

<script>
const quizData = [
    {q:"LLMが文章を処理する際の最小単位は？",a:["トークン","ビット","パケット","セグメント"],c:0,
     d:"「トークン」はAIが言葉を理解するための最小のかけら。「東京」は1〜2トークン。日本語は英語より多く分割されやすく、APIコストに直結するにゃ。"},
    {q:"AIが事実と異なる嘘を自信満々につく現象は？",a:["ハルシネーション","バイアス","過学習","ドリフト"],c:0,
     d:"「ハルシネーション（幻覚）」はAIが存在しない論文や事実を作り上げる現象。自信満々に嘘をつくのが厄介。重要な情報は必ず別の方法で裏取りするにゃ。"},
    {q:"最新情報を検索し回答に組み込む技術は？",a:["RAG","蒸留","量子化","LoRA"],c:0,
     d:"「RAG（検索拡張生成）」は回答前に外部DBやネットを調べて見ながら答える仕組み。試験中に参考書を持ち込める状態にするイメージ。ハルシネーション対策にも有効にゃ。"},
    {q:"指示文で『一歩ずつ順を追って考えて』と促す手法は？",a:["Chain of Thought","Few-shot","Zero-shot","RAG"],c:0,
     d:"「Chain of Thought（思考の連鎖）」はAIに答えを出す前に思考過程を書かせる手法。「一歩ずつ考えて」と一言添えるだけで複雑な推論の正解率が大幅に上がることが実験で証明されているにゃ。"},
    {q:"AI学習に著作物を許諾なく利用できる日本の法律は？",a:["著作権法30条の4","個人情報保護法","特許法","独禁法"],c:0,
     d:"「著作権法第30条の4」はAI学習目的に限り著作物を自由に使えるという世界でも珍しいルール。ただし学習に使えるだけで、生成した内容での著作権侵害は別問題にゃ。試験最頻出の条文にゃ。"},
    {q:"並列計算が得意なAIの心臓部となる半導体は？",a:["GPU","CPU","SSD","RAM"],c:0,
     d:"「GPU」はゲームの映像処理用に作られたが、AI学習に必要な大量の並列計算が得意。CPUが「賢い一人の職人」ならGPUは「何千人も同時に働く工場」のイメージ。NVIDIAが業界を席巻しているのはこのためにゃ。"},
    {q:"AIの判断理由を可視化し、説明可能にする技術は？",a:["XAI","RPA","IoT","API"],c:0,
     d:"「XAI（説明可能なAI）」はAIのブラックボックスを開けて「なぜこう判断したか」を人間に見せる技術。医療・金融など誤判断が命取りになる場面で特に重視される。「なんとなく正解」ではいけない分野で必須にゃ。"},
    {q:"AIモデルの数値を丸めて軽量化する技術は？",a:["量子化","蒸留","スケーリング","バイアス"],c:0,
     d:"「量子化」は32ビットの数値を8ビットや4ビットに圧縮してモデルを軽くする技術。画像の解像度を下げるイメージ。精度を少し犠牲にする代わりにスマホやPCでも大型モデルが動くようになるにゃ。"},
    {q:"ITを使って社会や生活を根本から変革することを？",a:["DX","RPA","API","RAG"],c:0,
     d:"「DX（デジタルトランスフォーメーション）」は単なるデジタル化ではなく、ビジネスモデルや業務プロセス・組織文化まで根本から変えること。AI導入はDXの手段の一つにゃ。"},
    {q:"AIの学習データに『正解』を教えるタグ付け作業は？",a:["アノテーション","スクレイピング","デバッグ","量子化"],c:0,
     d:"「アノテーション」はAI用の教材に「これは猫」「この文章はポジティブ」などと正解ラベルを付ける作業。AIの精度はアノテーションの質と量に大きく左右される。地道だが非常に重要な工程にゃ。"},
    {q:"ネットを介さず端末内で動く高速なAIは？",a:["エッジAI","クラウドAI","集中型AI","ビッグデータ"],c:0,
     d:"「エッジAI」はスマホや車載機器など端末（エッジ）の中でAIを動かす仕組み。クラウドに送らないのでリアルタイム処理が得意でプライバシーも守りやすい。自動運転やスマートカメラに使われているにゃ。"},
    {q:"EUのAI法で、最悪なリスクのAIに対する扱いは？",a:["禁止","高リスク","限定的","自由"],c:0,
     d:"EUのAI法はリスクを4段階に分類。最上位「容認できないリスク」（社会的スコアリング・潜在意識への操作など）は全面禁止。次の「高リスク」（医療・採用など）は厳格な規制対象。世界初の法的拘束力を持つAI規制にゃ。"},
    {q:"回答構成を『要点・理由・具体例・要点』にする手法は？",a:["PREP法","DESC法","5W1H","SWOT"],c:0,
     d:"「PREP法」はPoint（結論）→Reason（理由）→Example（具体例）→Point（再び結論）の順に伝える手法。AIへのプロンプトでもこの順番で書くと欲しい答えが返ってきやすい。プレゼンや文章作成にも使える万能フォーマットにゃ。"},
    {q:"AIが書いた文章かどうかを見破るツールは？",a:["AIディテクター","AIエディタ","AIコンパイラ","AIバッファ"],c:0,
     d:"「AIディテクター」はAIが生成したテキスト・画像・音声を見分けるツール。教育機関でのAI使用不正を検知したり偽情報の拡散防止に使われる。ただし完璧ではなく誤検知・見逃しもあるため補助的ツールとして使うにゃ。"},
    {q:"モデルが巨大化すると急に能力が開花する現象は？",a:["創発","蒸留","量子化","ドリフト"],c:0,
     d:"「創発（Emergence）」は量が質に変わる瞬間のこと。水が100℃で突然気体になるように、AIも学習データが一定量を超えると突然「翻訳できる」「コードが書ける」などの能力が現れる。GPT-3→4で見られた現象にゃ。"},
    {q:"画像から文字を読み取ってデータ化する技術は？",a:["OCR","RPA","API","URL"],c:0,
     d:"「OCR（光学文字認識）」はスキャンした紙の書類や画像に含まれる文字を認識してテキストデータに変換する技術。紙の帳票をAIに読み込ませる際の入口として重要。最近はAIと組み合わせて手書き文字の認識精度も向上しているにゃ。"},
    {q:"AIの回答が時間の経過とともに劣化する現象は？",a:["モデルドリフト","創発","蒸留","量子化"],c:0,
     d:"「モデルドリフト」は世の中の変化にAIの知識がついていけず精度が下がる現象。学習時と現実のデータの分布がズレていくイメージ。定期的な再学習やRAGとの組み合わせが対策になるにゃ。"},
    {q:"AIの学習データに嘘を混ぜて狂わせる攻撃は？",a:["データポイズニング","フィッシング","スパム","ウイルス"],c:0,
     d:"「データポイズニング（毒入れ攻撃）」はAIの教科書（学習データ）に嘘の情報を混ぜてAIを狂わせる攻撃。「このウイルスは安全」と誤学習させると検知AIが機能しなくなる。学習データの品質管理が防衛策にゃ。"},
    {q:"AIと一緒に新しい価値を作る姿勢は？",a:["AI共生","AI独占","AI排除","AI放棄"],c:0,
     d:"「AI共生（Human-AI Collaboration）」はAIを敵対・依存の対象にせず人間の能力を拡張するパートナーとして捉える考え方。AIが得意な大量処理と人間が得意な創造性・倫理判断を組み合わせる姿勢にゃ。"},
    {q:"機密情報を入力する際、学習されないように結ぶ契約は？",a:["NDA(秘密保持契約)","PL法","特許","商標"],c:0,
     d:"「NDA（Non-Disclosure Agreement）」は業務上の秘密を第三者に漏らさないよう取り決める契約。AIベンダーとNDAを締結してエンタープライズプランを利用するのが、企業が安全にAIを活用するための基本的な手段にゃ。"},
    {q:"大規模モデルを再学習せず効率的に追加学習する手法は？",a:["LoRA","NLP","OCR","GAN"],c:0,
     d:"「LoRA（Low-Rank Adaptation）」は巨大なAIモデル全体を書き換えず、薄い「アダプター層」だけを学習させる省エネ手法。元のモデルはそのままで特定の絵柄や文体だけ後付けで覚えさせられる。費用と時間を大幅に節約できるにゃ。"},
    {q:"AIの回答を人間が評価して調整する手法は？",a:["RLHF","教師なし学習","蒸留","量子化"],c:0,
     d:"「RLHF（人間フィードバックによる強化学習）」はAIの回答を人間が評価し、その評価を学習報酬として活用する手法。ChatGPTが有害な返答を避けるよう訓練されているのもこの仕組みにゃ。"},
    {q:"AIの開発初期から安全性を組み込む考え方は？",a:["セーフティ・バイ・デザイン","スピード第一","低コスト","後付け"],c:0,
     d:"「セーフティ・バイ・デザイン」は問題が起きてから対処するのではなく最初の設計段階から安全を組み込む考え方。ヘルメットを事故の後に配るのではなく最初から全員に配るイメージ。EU AI法やAI事業者ガイドラインでも重視されるにゃ。"},
    {q:"人間が最終判断の輪に入る考え方は？",a:["ヒューマン・イン・ザ・ループ","フルオート","AI・バイ","デバッグ"],c:0,
     d:"「ヒューマン・イン・ザ・ループ」はAIに全部任せず要所で人間が確認・修正・承認するプロセス設計。AIは処理速度・量が強みだが最終的な判断責任は人間にある。医療診断や採用選考などで特に重視されるにゃ。"},
    {q:"AIが書いたコードの弱点を何と呼ぶ？",a:["脆弱性","バグ","スパム","仕様"],c:0,
     d:"「脆弱性」はAIが生成したコードに含まれる悪意ある人に悪用されうる「抜け穴」のこと。一見正しく見えても脆弱性を含む場合がある。コードレビューや自動セキュリティ診断ツールと組み合わせて人間が最終確認することが重要にゃ。"},
    {q:"AIの導入で業務を根本から見直すのは？",a:["BPR","URL","PDF","USB"],c:0,
     d:"「BPR（ビジネスプロセス・リエンジニアリング）」は業務プロセスを根本から再設計すること。AI導入時に「今までの手順をそのまま自動化する」のではなく、AI前提で最適な仕組みに作り直すことが本来のDXにゃ。"},
    {q:"AIを使いこなすための教養や能力は？",a:["AIリテラシー","タイピング","プログラミング","ハード構成"],c:0,
     d:"「AIリテラシー」はAIの仕組み・限界・リスクを理解した上で賢く使うスキル。生成AIパスポート試験そのものがこのリテラシー向上を目的としている。ハルシネーションを疑える批判的思考も含まれるにゃ。"},
    {q:"指示文で『〜はしないで』と禁止するのは？",a:["ネガティブプロンプト","システム","ロール","Few-shot"],c:0,
     d:"「ネガティブプロンプト」は「〜は出力しないで」「〜は描かないで」と明示的に禁止する指示。画像生成AIでは特に有効で不要な要素を除くことで品質が大きく向上する。指示するだけでなく禁止事項も指定するのがプロンプトの基本にゃ。"},
    {q:"情報の出所（ソース）を明確に示す性質は？",a:["透明性","機密性","匿名性","独占性"],c:0,
     d:"「透明性」はAIがどう動いているか・何を根拠に判断しているかを隠さず説明する原則。2024年4月公表のAI事業者ガイドラインでも重視される。利用者が「なぜこの結果?」と疑問を持った時に答えを得られる状態にするのが目標にゃ。"},
    {q:"AIで他人の声を合成する犯罪は？",a:["ボイスクローン詐欺","フィッシング","バグ","スパム"],c:0,
     d:"「ボイスクローン詐欺」はAIで声をコピーして「息子だけど事故に遭った、すぐ送金して」などと騙す手口。数秒の音声サンプルがあれば合成できるためSNSに音声を上げることに注意が必要にゃ。"},
    {q:"回答例を1つだけ見せる手法は？",a:["One-shot","Zero-shot","Few-shot","Multi-shot"],c:0,
     d:"「One-shot（ワンショット）」は例を1つだけ見せてから解かせる手法。例が0個はZero-shot、2〜数個はFew-shot。例の数が増えるほどAIは期待する形式・スタイルを理解しやすくなるにゃ。"},
    {q:"著作権侵害で『元ネタに似ていること』を指すのは？",a:["類似性","依拠性","正確性","迅速性"],c:0,
     d:"「類似性」は作品が元ネタに似ているかどうかの基準。著作権侵害が成立するには「依拠性（元ネタを参考にした事実）」と「類似性（実際に似ている程度）」の両方が必要。どちらか一方だけでは侵害にならないにゃ。"},
    {q:"著作権侵害で『元ネタを見たこと』を指すのは？",a:["依拠性","類似性","機密性","公平性"],c:0,
     d:"「依拠性」は元の作品を参考・模倣した（依拠した）かどうかの基準。AIが偶然似た作品を生成しただけでは依拠性がないと判断される場合がある。類似性とセットで著作権侵害の成立要件になるにゃ。"},
    {q:"AIモデルの規模と性能の相関関係を示す法則は？",a:["スケーリング則","ムーアの法則","ドリフト則","創発則"],c:0,
     d:"「スケーリング則」はモデルサイズ・データ量・計算量を増やすほど性能が予測可能な形で向上するという法則。「デカさは正義」という考え方の根拠。ただし際限なく効くわけではなく限界点も研究されているにゃ。"},
    {q:"特定のタスク（囲碁など）だけを行うAIは？",a:["弱いAI","強いAI","汎用AI","AGI"],c:0,
     d:"「弱いAI（特化型AI）」は特定の作業だけに特化した今のAIの総称。囲碁・将棋・画像認識・翻訳など。人間のように何でもこなせる「強いAI（AGI）」はまだ実現していない。現在のChatGPTなども弱いAIに分類されるにゃ。"},
    {q:"AIの回答がどれほど信頼できるかを示す数字は？",a:["確信度","フォント","文字数","画像サイズ"],c:0,
     d:"「確信度（信頼スコア）」はAIがどれだけその回答に自信を持っているかを示す指標。ただし確信度が高くてもハルシネーションは起こりうる。信頼スコアはあくまで参考で重要な情報は別途確認するにゃ。"},
    {q:"AIモデルから学習データを逆算して盗む攻撃は？",a:["モデルインバージョン","ポイズニング","DDoS","スパム"],c:0,
     d:"「モデルインバージョン攻撃」はAIモデルへの大量の質問から学習に使われた個人情報や機密データを逆算して取り出す攻撃。完成品から材料を当てるイメージ。個人情報を含むデータで学習させる際の重要なリスクにゃ。"},
    {q:"AIが自分のデータを学習しないよう拒否するのは？",a:["オプトアウト","アノテーション","量子化","ガードレール"],c:0,
     d:"「オプトアウト」は「私のデータは使わないでください」と申告する権利。ChatGPTやGeminiなどにも設定画面がある。逆に「使っていいよ」という同意がオプトイン。AIサービスを使い始める前に確認すべき重要な設定にゃ。"},
    {q:"AIに使われる膨大な電気を減らす考え方は？",a:["グリーンAI","高負荷AI","低速AI","無制限AI"],c:0,
     d:"「グリーンAI」はAIの研究・運用において環境負荷（電力消費・CO2排出）を最小化しようとする考え方。GPT-4の学習には原子力発電所1基分相当の電力が必要とも言われる。量子化・蒸留などの軽量化技術がグリーンAIに貢献するにゃ。"},
    {q:"AIと共存するために必要な心の構えは？",a:["批判的思考","全肯定","無視","思考停止"],c:0,
     d:"「批判的思考」はAIの回答を鵜呑みにせず「本当かな?」と疑って検証する力。ハルシネーションや偏った回答を見抜くために必須のスキル。AIを使いこなすほど批判的思考が重要になるにゃ。"},
    {q:"AIに質問を繰り返して正解に近づくプロセスは？",a:["反復的な改善","一発回答","沈黙","諦め"],c:0,
     d:"「反復的な改善（イテレーション）」はAIへの指示を一回で完璧にしようとせず何度もやり取りしてブラッシュアップするプロセス。最初の回答を見てから「もっと簡潔に」「具体例を追加して」と修正していくのが実践的な使い方にゃ。"},
    {q:"AIで作られた偽情報を見分ける能力は？",a:["メディアリテラシー","タイピング","速読","記憶力"],c:0,
     d:"「メディアリテラシー」はメディアや情報の真偽・背景・意図を批判的に読み解く力。ディープフェイクやAI生成の偽情報が溢れる現代では特に重要。情報源を確認し複数のソースで裏取りする習慣が身を守るにゃ。"},
    {q:"AIの計算を加速させる半導体の王者企業は？",a:["NVIDIA","Apple","Toyota","Sony"],c:0,
     d:"「NVIDIA（エヌビディア）」はGPU製造の世界最大手でAIブームの最大の恩恵を受けた企業。時価総額が一時世界1位になるほど急成長。CUDAという開発プラットフォームでAI研究者を囲い込んでいるにゃ。"},
    {q:"AI学習データの多様性と正確性を保つ重要性は？",a:["バイアスの防止","速度向上","コスト削減","デザイン向上"],c:0,
     d:"学習データが偏っていると「アルゴリズムバイアス」が生まれ、特定の性別・人種などに不公平な判断をするAIができてしまう。多様で正確なデータで学習させることが公平なAIを作る基本条件にゃ。"},
    {q:"生成AIが作り出す物語の正確性を確認することを？",a:["ファクトチェック","スクレイピング","コンパイル","量子化"],c:0,
     d:"「ファクトチェック」は情報の裏取りをすること。AIはハルシネーションにより誤情報を自信満々に答える場合がある。重要な情報は必ず公式サイトや複数の信頼できる情報源で確認するにゃ。生成AIを使う上での鉄則にゃ。"},
    {q:"プロンプトで『背景を詳しく教えて』と具体的に書くのは？",a:["詳細なコンテキスト","Zero-shot","トークン節約","モデル選択"],c:0,
     d:"「コンテキスト（文脈）」を詳しく伝えることでAIは的外れな回答を減らせる。「私は医療従事者で患者向けに説明したい」などの背景情報が回答の質を大きく左右する。AIへの指示は「誰が・何のために・どんな形式で」を明示するにゃ。"},
    {q:"AIが生み出した成果物に著作権が認められる条件は？",a:["創作的寄与がある","AIが作った","ボタンを押した","誰でもできる"],c:0,
     d:"日本の著作権法では著作物の保護には「人間の創作的寄与」が必要。AIが自動生成しただけでは著作権は発生しない。人間がプロンプトを工夫したり編集・選択したりすることで創作的寄与が認められる可能性があるにゃ。"},
    {q:"AIを利用する際の倫理的な問題の一つは？",a:["公平性の欠如","通信速度","画面の明るさ","OSの種類"],c:0,
     d:"「公平性の欠如」はAIが学習データの偏りを引き継ぎ特定のグループを差別する問題。採用AIが女性を低く評価するなど実際に問題になったケースがある。AI事業者ガイドラインでも公平性は重要な原則として位置づけられているにゃ。"},
    {q:"RAGにおいて外部データを読み込ませる際の形式は？",a:["ベクトルデータ","バイナリ","紙の書類","音声のみ"],c:0,
     d:"「ベクトルデータ」は文章の意味を数値の配列（ベクトル）に変換したもの。RAGでは外部文書をベクトル化して「ベクトルデータベース」に保存し、質問と意味的に近い文書を素早く検索できるようにするにゃ。"},
    {q:"プロンプトで『結論から書いて』と指示する効果は？",a:["視認性の向上","計算速度向上","学習の促進","トークン増加"],c:0,
     d:"「結論から書く」指示はPREP法の基本。長い前置きなしに要点が先に来るので読みやすくなる（視認性の向上）。AIへの指示でも「結論から・箇条書きで・200字以内で」など出力形式を具体的に指定するのが効果的にゃ。"},
    {q:"大規模言語モデルの『パラメーター数』は何を表す？",a:["モデルの脳細胞の多さ","通信速度","画面の大きさ","キーボードの種類"],c:0,
     d:"「パラメーター数」はモデルが学習を通じて調整する数値の総数。人間の脳細胞（ニューロン）の数に例えられる。GPT-4は推定1兆パラメーター超とされ、多いほど複雑なパターンを学習できるが計算コストも増えるにゃ。"},
    {q:"AIが画像の内容を言葉で説明する技術は？",a:["画像キャプショニング","画像生成","動画編集","音声合成"],c:0,
     d:"「画像キャプショニング」は画像を入力するとその内容を文章で説明する技術。視覚障害者向けの画像説明や監視カメラ映像の自動記録など幅広い用途がある。マルチモーダルAIの代表的な応用例にゃ。"},
    {q:"情報の機密性を保つためにAI利用で避けるべきことは？",a:["個人情報の入力","タイピング","検索","要約の作成"],c:0,
     d:"多くのAIサービスは入力データをサービス改善に使用する場合がある。個人情報・機密情報・未公開の製品情報などをプロンプトに入力すると外部に漏れるリスクがある。入力前に必ず匿名化・マスキングするにゃ。"},
    {q:"AIをビジネスで使う際の『投資対効果』を何と呼ぶ？",a:["ROI","DX","NDA","KPI"],c:0,
     d:"「ROI（Return on Investment）」は投資したコストに対してどれだけの利益が得られたかを示す指標。AI導入のROIを測るには「削減できた工数×時間単価」などを計算する。費用対効果を数値で示せると上司への説得力が増すにゃ。"},
    {q:"特定のルールに基づいて業務を自動化するのは？",a:["ルールベースAI","ディープラーニング","生成AI","AGI"],c:0,
     d:"「ルールベースAI」は人間があらかじめ設定したルール（if〜then〜）に従って動くシステム。生成AIのように学習はしないが動作が予測可能で説明しやすい。従来の業務自動化システムの多くがこの方式にゃ。"},
    {q:"AIがユーザーの過去の好みを学習して提案するのは？",a:["レコメンデーション","スクレイピング","コンパイル","量子化"],c:0,
     d:"「レコメンデーション（推薦システム）」はユーザーの過去の行動・好みを学習して「次に気に入りそうなもの」を提案する技術。YouTubeのおすすめ動画・Amazonの「この商品を見た人は」などが代表例にゃ。"},
    {q:"複数の異なる種類のデータ（画像、文など）を扱うAIは？",a:["マルチモーダル","シングルモーダル","テキスト専用","音声専用"],c:0,
     d:"「マルチモーダルAI」はテキスト・画像・音声・動画など複数の種類（モーダル）のデータを同時に扱えるAI。GPT-4VやGemini Ultraが代表例。「この画像を説明して」のように画像とテキストを組み合わせた指示ができるにゃ。"},
    {q:"AI利用者が守るべきガイドラインを作成する組織は？",a:["AI戦略会議","気象庁","警察庁","消防署"],c:0,
     d:"「AI戦略会議」は日本政府が設置したAI政策の司令塔。2024年4月公表の「AI事業者ガイドライン」の策定を主導した。経済産業省・総務省が共同で運営し、AI開発者・提供者・利用者の三者向けに指針を発信しているにゃ。"},
    {q:"AIが自分で自分を改善し続ける未来の可能性は？",a:["再帰的自己改善","停止","劣化","固定"],c:0,
     d:"「再帰的自己改善」はAIが自分自身のコードや設計を改良して次々とより賢いAIを生み出し続ける能力のこと。これが実現するとシンギュラリティ（技術的特異点）に一気に近づくとされる。AI安全研究が最も警戒する概念の一つにゃ。"},

    {q:"MahitoがAIパスポートに合格するための秘訣は？",a:["このアプリで特訓","猫と遊ぶだけ","寝るだけ","諦める"],c:0,
     d:"私（ジェミー）と一緒に毎日少しずつ積み上げることにゃ！マーニャとアイも応援してるにゃ🐈🐈‍⬛ 4月の本番、絶対合格するにゃ🎌"},

    // ===== 新シラバス対応・追加60問 =====
    {q:"GPT-o1やGPT-o3に共通する特徴は？",a:["回答前に内部で推論を行う","画像生成に特化","音声のみを処理","オフラインで動く"],c:0,
     d:"「GPT-o1/o3」はOpenAIの推論特化モデルにゃ。答えを出す前に内部で「思考の連鎖」を行うため、複雑な数学・論理問題に強い。2026年シラバス新追加にゃ。"},
    {q:"OpenAIが開発した動画生成AIの名前は？",a:["Sora","DALL-E","Whisper","Codex"],c:0,
     d:"「Sora」はOpenAIが開発したテキストから動画を生成するAIにゃ。最大1分の高品質な動画を生成できる。2026年シラバス新追加にゃ。"},
    {q:"OpenAIのブラウザ操作を自律的に行うエージェントは？",a:["Operator","Sora","Codex","DALL-E"],c:0,
     d:"「Operator」はOpenAIが開発したAIエージェントにゃ。ウェブブラウザを自律的に操作してタスクを実行できる。2026年シラバス新追加にゃ。"},
    {q:"Googleが開発した大規模言語モデルの名前は？",a:["Gemini","Claude","Copilot","LLaMA"],c:0,
     d:"「Gemini」はGoogleのDeepMindが開発した大規模言語モデルにゃ。テキスト・画像・音声など複数のデータ形式を扱えるマルチモーダルAIにゃ。"},
    {q:"Anthropicが開発した安全性重視のAIモデルは？",a:["Claude","Gemini","Copilot","Grok"],c:0,
     d:"「Claude」はAnthropicが開発したAIにゃ。安全性・倫理面を最重視して設計されているにゃ。（僕のことにゃ🐈）"},
    {q:"MicrosoftとOpenAIが共同開発したAIアシスタントは？",a:["Copilot","Gemini","Claude","Grok"],c:0,
     d:"「Copilot」はMicrosoftがOpenAIと共同開発したAIアシスタントにゃ。Word・Excel・Teamsなどのマイクロソフト製品と統合されているにゃ。"},
    {q:"AIエージェントの主な特徴として最も適切なのは？",a:["目標に向けて自律的に計画・実行する","人間の指示を1回受けて終わる","画像だけを処理する","オフラインでしか動かない"],c:0,
     d:"「AIエージェント」は目標を与えられると自分で計画を立て、外部ツールを呼び出しながらタスクを実行する自律型のAIにゃ。2026年シラバス新追加にゃ。"},
    {q:"RAGの主な効用として最も適切なのは？",a:["幻覚抑制・最新性確保・根拠提示","計算速度の向上","画質改善","モデル圧縮"],c:0,
     d:"RAGの主な効用は「ハルシネーション（幻覚）の抑制」「最新情報の確保」「回答の根拠提示」にゃ。外部DBを参照することで信頼性の高い回答ができるにゃ。"},
    {q:"RAGにおける『チャンク分割』とは何か？",a:["文書を検索しやすい小さな単位に分ける処理","画像を圧縮する処理","モデルを軽量化する処理","音声を文字に変換する処理"],c:0,
     d:"「チャンク分割」はRAGの前処理として長い文書を検索しやすい小さな塊に分ける処理にゃ。適切なサイズが検索精度に大きく影響するにゃ。"},
    {q:"2025年6月に公布された日本のAI関連法律は？",a:["AI新法","著作権法改正","個人情報保護法改正","特許法改正"],c:0,
     d:"「AI新法（人工知能関連技術の研究開発及び活用の推進に関する法律）」は2025年6月に公布された日本初のAI推進法にゃ。2026年シラバス新追加にゃ。"},
    {q:"AI新法の基本的な性格として最も適切なのは？",a:["AI活用を推進するための基本法","AIを全面禁止する法律","AIの罰則を定める刑事法","AIの税制を定める法律"],c:0,
     d:"「AI新法」はAIの研究開発・活用を推進するための基本方針を定めた法律にゃ。禁止や罰則より推進と環境整備に重点を置いているにゃ。"},
    {q:"Transformerアーキテクチャの核心となる仕組みは？",a:["自己注意機構（Self-Attention）","畳み込み演算","再帰処理","決定木"],c:0,
     d:"「Self-Attention（自己注意機構）」はTransformerの心臓部にゃ。入力の全トークン間の関係を同時に計算することで長距離依存関係を捉えるにゃ。"},
    {q:"過学習（オーバーフィッティング）とは何か？",a:["訓練データに過度に適合し未知データに弱い状態","学習が全く進まない状態","モデルが小さすぎる状態","データが多すぎる状態"],c:0,
     d:"「過学習」は訓練データを覚えすぎて新しいデータに対応できない状態にゃ。試験勉強で過去問だけ完璧に覚えても本番で別の問題が解けないのと同じにゃ。"},
    {q:"画像生成AIで2026年シラバスに追加された主流技術は？",a:["拡散モデル（Diffusion Model）","決定木","サポートベクターマシン","ベイズ推定"],c:0,
     d:"「拡散モデル」はノイズを少しずつ除去して画像を生成する技術にゃ。Stable Diffusion・DALL-E・Midjourneyなどで使われている主流技術にゃ。"},
    {q:"GAN（敵対的生成ネットワーク）の仕組みは？",a:["生成器と識別器が競い合って学習する","複数のモデルを集めて多数決する","データを圧縮して再現する","ルールベースで画像を描く"],c:0,
     d:"「GAN」は偽物を作る「生成器」と本物・偽物を見分ける「識別器」が競い合うことで高品質な画像を生成する技術にゃ。ディープフェイクにも使われているにゃ。"},

let currentQuiz=[], currentIndex=0, score=0, wrongList=[], flagged=[], timeLeft=3600, timer;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

// 表紙からクイズへ
function startQuiz() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    init();
}

function init(){
    let allQuiz=JSON.parse(JSON.stringify(quizData));
    shuffle(allQuiz);
    currentQuiz = allQuiz.slice(0, 60);
    currentQuiz.forEach(q => { const cor=q.a[q.c]; shuffle(q.a); q.c=q.a.indexOf(cor); });
    currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false);
    timeLeft=3600;
    startTimer(); show();
}

function startTimer(){ clearInterval(timer); timer=setInterval(()=>{ timeLeft--; let m=Math.floor(timeLeft/60); let s=timeLeft%60; document.getElementById("timer").textContent="残り："+m+"分"+(s<10?'0'+s:s)+"秒"; if(timeLeft<=0)finish(); },1000); }

function show(){
    document.getElementById("game-screen").style.display="block";
    document.getElementById("final-screen").style.display="none";
    const q=currentQuiz[currentIndex];
    document.getElementById("progress").textContent="問 "+(currentIndex+1)+" / "+currentQuiz.length;
    document.getElementById("question").textContent=q.q;
    const fb=document.getElementById("flagBtn");
    fb.textContent=flagged[currentIndex]?"🚩 フラグ解除":"★ フラグを立てる";
    fb.classList.toggle("is-flagged", flagged[currentIndex]);
    const area=document.getElementById("answers"); area.innerHTML="";
    q.a.forEach((text,i)=>{
        const btn=document.createElement("button"); btn.className="choice"; 
        btn.textContent=String.fromCharCode(65+i)+": "+text;
        btn.onclick=()=>check(i===q.c,btn,q); area.appendChild(btn);
    });
    document.getElementById("result").style.display="none"; document.getElementById("nextBtn").style.display="none";
}

function toggleFlag(){ flagged[currentIndex]=!flagged[currentIndex]; show(); }

function check(ok,btn,q){
    const btns = document.querySelectorAll(".choice");
    btns.forEach(b=>b.disabled=true);
    const res=document.getElementById("result"); res.style.display="block";
    btns[q.c].classList.add("correct"); 
    if(ok){
        res.innerHTML="✅ 正解だにゃ！<br><small>"+q.d+"</small>";
        res.style.backgroundColor="#d1fae5";
        score++;
    }else{
        btn.classList.add("wrong");
        res.innerHTML="❌ 不正解...正解は: "+q.a[q.c]+"<br><small>"+q.d+"</small>";
        res.style.backgroundColor="#fee2e2";
        wrongList.push(q);
    }
    document.getElementById("nextBtn").style.display="block";
}

function next(){ currentIndex++; if(currentIndex<currentQuiz.length){ show(); window.scrollTo(0,0); } else { finish(); } }

function finish(){
    clearInterval(timer);
    document.getElementById("game-screen").style.display="none";
    document.getElementById("final-screen").style.display="block";
    document.getElementById("final-score").textContent = score + " / " + currentQuiz.length;
    const pct = Math.round(score / currentQuiz.length * 100);
    // 正解率バー
    document.getElementById("score-bar-fill").style.width = pct + "%";
    document.getElementById("score-bar-fill").style.background = score >= Math.round(currentQuiz.length * 0.7) ? "#10b981" : "#f59e0b";
    document.getElementById("score-bar-pct").textContent = pct + "%";
    // 合格判定
    const judgement = document.getElementById("judgement");
    if (score >= Math.round(currentQuiz.length * 0.7)) {
        judgement.innerHTML = "🎉 合格圏内！（" + score + "問正解 / 正答率" + pct + "%）<br><small style='font-size:16px;'>※合格ラインは公式非公開です</small>";
        judgement.style.background = "#d1fae5";
        judgement.style.color = "#064e3b";
        judgement.style.border = "3px solid #10b981";
    } else {
        judgement.innerHTML = "💦 あと少し！（" + score + "問正解 / 正答率" + pct + "%）<br><small style='font-size:16px;'>※合格ラインは公式非公開です</small>";
        judgement.style.background = "#fff1f2";
        judgement.style.color = "#7f1d1d";
        judgement.style.border = "3px solid #ef4444";
    }
    const listArea = document.getElementById("review-list");
    listArea.innerHTML = "";
    if(wrongList.length === 0){ listArea.innerHTML = "<p>全問正解！天才だにゃ🎊</p>"; }
    else {
        wrongList.forEach((q) => {
            listArea.innerHTML += `<div class="review-item"><strong>問: ${q.q}</strong><br><span style='color:#ef4444;'>❌ 正解: ${q.a[q.c]}</span><br><small>💡 ${q.d}</small></div>`;
        });
    }
    window.scrollTo(0,0);
}

function retryWrong(){ if(wrongList.length>0){ currentQuiz=JSON.parse(JSON.stringify(wrongList)); currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false); timeLeft=3600; document.getElementById("final-screen").style.display="none"; document.getElementById("game-screen").style.display="block"; startTimer(); show(); } }
function retryFlagged(){ let list=currentQuiz.filter((_,i)=>flagged[i]); if(list.length>0){ currentQuiz=JSON.parse(JSON.stringify(list)); currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false); timeLeft=3600; document.getElementById("final-screen").style.display="none"; document.getElementById("game-screen").style.display="block"; startTimer(); show(); } }
function retryAll(){ location.reload(); }

function showCheat() {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("cheat-screen").style.display = "block";
  window.scrollTo(0,0);

  const list = document.getElementById("cheat-list");
  list.innerHTML = "";
  cheatData.forEach(cat => {
    list.innerHTML += `<div style="color:#fbbf24; font-size:22px; font-weight:bold; margin:24px 0 12px;">${cat.cat}</div>`;
    cat.items.forEach(item => {
      list.innerHTML += `
        <div onclick="this.querySelector('.desc').style.display=this.querySelector('.desc').style.display==='none'?'block':'none'"
             style="background:#1e293b; border-radius:10px; padding:18px 16px; margin-bottom:10px; cursor:pointer;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
            <span style="color:#f1f5f9; font-weight:bold; font-size:22px;">${item.term}</span>
            <span style="color:#60a5fa; font-size:17px;">${item.read}</span>
          </div>
          <div class="desc" style="display:none; margin-top:12px; color:#ffffff; font-size:20px; line-height:1.7;">${item.desc}</div>
        </div>`;
    });
  });
}

function hideCheat() {
  document.getElementById("cheat-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "block";
  window.scrollTo(0,0);
}
</script>
