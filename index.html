<title>AIパスポート最強アプリ【決定版】</title>
<style>
/* Mahito専用：フォントサイズは変更せず、見やすさ重視 */
body { font-family:sans-serif; background:#f4f7f6; padding:15px; margin:0; font-size: 22px; }
.container { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
h2 { font-size:26px; color:#1e293b; border-left:12px solid #2563eb; padding-left:15px; }
.menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.menu button { background:#111827; color:#fff; font-size:16px; padding:12px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; }
#flagBtn { background:#f59e0b; color:#fff; margin-bottom: 15px; padding:20px; font-size:22px; border-radius:12px; border:none; width:100%; font-weight:bold; cursor:pointer; }
.is-flagged { background:#ef4444 !important; }
#question { font-size:26px; font-weight:bold; margin:20px 0; background:#f8f9fa; padding:20px; border-radius:12px; border:1px solid #e2e8f0; }
button.choice { padding:22px; margin:10px 0; width:100%; border-radius:15px; border:2px solid #cbd5e1; background:#fff; font-size:22px; font-weight:bold; text-align:left; cursor:pointer; }
.correct { background:#d1fae5 !important; border-color:#10b981 !important; color:#064e3b; }
.wrong { background:#fee2e2 !important; border-color:#ef4444 !important; color:#7f1d1d; }
#result { margin-top:15px; font-weight:bold; font-size:22px; padding:15px; border-radius:10px; display:none; border:2px solid #ddd; }
#nextBtn { background:#2563eb; color:#fff; padding:22px; font-size:24px; width:100%; border:none; border-radius:15px; font-weight:bold; cursor:pointer; display:none; margin-top:20px; }
#final-screen { display:none; text-align: center; }
.review-box { text-align: left; background: #fff1f2; padding: 15px; margin-top: 20px; border-radius: 10px; border-left: 8px solid #ef4444; }
.review-item { margin-bottom: 20px; border-bottom: 1px solid #fda4af; padding-bottom: 10px; font-size: 22px; }

}
#start-btn {

}

#cat-toggle-btn {
  display: block;

  margin: 12px auto 0;
  padding: 24px;
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #059669, #10b981);
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(5,150,105,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
#cat-toggle-btn:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(5,150,105,0.6); }
#cat-toggle-btn:active { transform: scale(0.97); }
.cat-btn { display:block; width:100%; padding:16px 20px; margin-bottom:8px; background:#0f172a; color:#f1f5f9; border:2px solid #334155; border-radius:12px; font-size:20px; font-weight:bold; text-align:left; cursor:pointer; transition:background 0.15s,border-color 0.15s; }
.cat-btn:hover { background:#1e3a5f; border-color:#3b82f6; }
.cat-btn:last-child { margin-bottom:0; }
#cheat-btn {
  display: block;
  width: 90%;
  max-width: 420px;
  margin: 12px auto 0;
  padding: 24px;
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(37,99,235,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
#cheat-btn:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(37,99,235,0.6); }
#cheat-btn:active { transform: scale(0.97); }
#start-screen .edition-note {
  color: #64748b;
  font-size: 16px;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- ===== 表紙（スタート画面）===== -->
<div id="start-screen">
  <p class="cover-title">Mahito's Edition 2026</p>
  <div class="cover-image-wrapper">
    <!-- 画像ファイルをGitHubに置いていない場合は下の fallback が表示されます -->
    <img src="image_0aff13.png" alt="AIパスポート模試" 
         onerror="this.style.display='none'; document.getElementById('cover-fallback').style.display='block';">
    <div id="cover-fallback" class="cover-fallback" style="display:none;">
      <div class="big-title">🐱 生成AIパスポート</div>
      <div class="big-title">最新200問搭載！</div>
      <div class="sub">2026年新シラバス対応 ／ 4択形式</div>
    </div>
  </div>
  <button id="start-btn" onclick="startQuiz()">🐱 ランダム200問から60問に挑戦！</button>
  <button onclick="toggleCategoryMenu()" id="cat-toggle-btn">📚 カテゴリ別練習</button>
  <div id="cat-menu" style="display:none;width:90%;max-width:420px;margin:0 auto 0;background:#1e293b;border-radius:16px;padding:16px;text-align:left;">
      <p style="color:#94a3b8;font-size:16px;margin:0 0 12px 4px;">苦手分野を集中練習にゃ🐈</p>
      <button onclick="startCategory('tech')" class="cat-btn">🔧 AI基礎技術（70問）</button>
      <button onclick="startCategory('models')" class="cat-btn">💬 生成AIモデル（9問）</button>
      <button onclick="startCategory('prompt')" class="cat-btn">✍️ プロンプト技術（24問）</button>
      <button onclick="startCategory('law')" class="cat-btn">⚖️ 法律・著作権（27問）</button>
      <button onclick="startCategory('business')" class="cat-btn">🏢 ビジネス活用（34問）</button>
      <button onclick="startCategory('security')" class="cat-btn">🛡️ セキュリティ（20問）</button>
      <button onclick="startCategory('policy')" class="cat-btn">📋 AI政策・倫理（16問）</button>
    </div>
  <button onclick="showCheat()" id="cheat-btn">📖 略語チートシートを見る</button>
  <p class="edition-note">全200問収録 ／ 毎回60問ランダム出題 ／ キジトラ応援団🐈</p>
  <p id="gc-visits" style="color:#64748b; font-size:16px; margin-top:4px;">👀 訪問者数：読み込み中...</p>
  <script>
    fetch('https://mahito.goatcounter.com/counter/TOTAL.json')
      .then(r => r.json())
      .then(d => { document.getElementById('gc-visits').textContent = '👀 訪問者数：' + d.count + ' 人'; })
      .catch(() => { document.getElementById('gc-visits').textContent = '👀 訪問者数：集計中'; });
  </script>
  <div style="margin-top:20px; background:#1e293b; border-radius:12px; padding:20px 24px; text-align:center; font-size:22px; font-weight:bold; color:#fbbf24; letter-spacing:0.05em;">
    猫と学べるAIパスポート最強ドリル🐈
  </div>
</div>

<!-- ===== チートシート画面 ===== -->
<div id="cheat-screen" style="display:none; max-width:700px; margin:auto; background:#0f172a; border-radius:20px; padding:24px 20px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div style="color:#fbbf24; font-size:22px; font-weight:bold;">📖 略語チートシート</div>
    <button onclick="hideCheat()" style="background:#334155; color:#fff; border:none; border-radius:20px; padding:8px 20px; font-size:16px; cursor:pointer;">← 戻る</button>
  </div>
  <div style="color:#94a3b8; font-size:18px; margin-bottom:16px;">2026年新シラバス対応 ／ タップで解説を表示</div>
  <div id="cheat-list"></div>
</div>

<!-- ===== クイズ画面（元のコードそのまま）===== -->
<div id="game-screen" class="container" style="display:none;">
    <h2>AIパスポート実戦</h2>
    <div class="menu">
        <button onclick="retryWrong()">❌ミス</button>
        <button onclick="retryFlagged()">🚩フラグ</button>
        <button onclick="retryAll()">🔄リセット</button>
    </div>
    <div id="progress" style="font-weight:bold; color:#64748b;"></div>
    <div id="timer" style="font-weight:bold; color:#ef4444; font-size:22px; margin-bottom:15px;"></div>
    <button id="flagBtn" onclick="toggleFlag()">★ フラグを立てる</button>
    <div id="question"></div>
    <div id="answers"></div>
    <div id="result"></div>
    <button id="nextBtn" onclick="next()">次の問題へ ➔</button>
</div>

<div id="final-screen" class="container">
    <h2>試験結果発表</h2>
    <div id="final-score" style="font-size:60px; font-weight:bold; color:#2563eb;"></div>
    <div id="judgement" style="margin:15px auto; max-width:500px; padding:20px; border-radius:12px; font-size:22px; font-weight:bold;"></div>
    <div style="margin:10px auto 20px; max-width:500px;">
      <div style="display:flex; justify-content:space-between; font-size:16px; color:#64748b; margin-bottom:6px;">
        <span>正解率</span><span id="score-bar-pct"></span>
      </div>
      <div style="background:#e2e8f0; border-radius:50px; height:22px; overflow:hidden;">
        <div id="score-bar-fill" style="height:100%; width:0%; border-radius:50px; transition:width 1s ease;"></div>
      </div>
    </div>
    <div id="review-area" class="review-box">
        <h3>📋 復習リスト（間違えた問題）</h3>
        <div id="review-list"></div>
    </div>
    <button onclick="retryAll()" style="background:#27ae60; color:#fff; padding:25px; width:100%; border:none; border-radius:15px; font-weight:bold; font-size:22px; cursor:pointer; margin-top:30px;">🔄 最初からやり直す</button>
</div>

<script>
const quizData = [
    {q:"LLMが文章を処理する際の最小単位は？",a:["トークン","ビット","パケット","セグメント"],cat:'tech',c:0,
     d:"「トークン」はAIが言葉を理解するための最小のかけら。「東京」は1〜2トークン。日本語は英語より多く分割されやすく、APIコストに直結するにゃ。"},
    {q:"AIが事実と異なる嘘を自信満々につく現象は？",a:["ハルシネーション","バイアス","過学習","ドリフト"],cat:'tech',c:0,
     d:"「ハルシネーション（幻覚）」はAIが存在しない論文や事実を作り上げる現象。自信満々に嘘をつくのが厄介。重要な情報は必ず別の方法で裏取りするにゃ。"},
    {q:"最新情報を検索し回答に組み込む技術は？",a:["RAG","蒸留","量子化","LoRA"],cat:'tech',c:0,
     d:"「RAG（検索拡張生成）」は回答前に外部DBやネットを調べて見ながら答える仕組み。試験中に参考書を持ち込める状態にするイメージ。ハルシネーション対策にも有効にゃ。"},
    {q:"指示文で『一歩ずつ順を追って考えて』と促す手法は？",a:["Chain of Thought","Few-shot","Zero-shot","RAG"],cat:'prompt',c:0,
     d:"「Chain of Thought（思考の連鎖）」はAIに答えを出す前に思考過程を書かせる手法。「一歩ずつ考えて」と一言添えるだけで複雑な推論の正解率が大幅に上がることが実験で証明されているにゃ。"},
    {q:"AI学習に著作物を許諾なく利用できる日本の法律は？",a:["著作権法30条の4","個人情報保護法","特許法","独禁法"],cat:'law',c:0,
     d:"「著作権法第30条の4」はAI学習目的に限り著作物を自由に使えるという世界でも珍しいルール。ただし学習に使えるだけで、生成した内容での著作権侵害は別問題にゃ。試験最頻出の条文にゃ。"},
    {q:"並列計算が得意なAIの心臓部となる半導体は？",a:["GPU","CPU","SSD","RAM"],cat:'tech',c:0,
     d:"「GPU」はゲームの映像処理用に作られたが、AI学習に必要な大量の並列計算が得意。CPUが「賢い一人の職人」ならGPUは「何千人も同時に働く工場」のイメージ。NVIDIAが業界を席巻しているのはこのためにゃ。"},
    {q:"AIの判断理由を可視化し、説明可能にする技術は？",a:["XAI","RPA","IoT","API"],cat:'tech',c:0,
     d:"「XAI（説明可能なAI）」はAIのブラックボックスを開けて「なぜこう判断したか」を人間に見せる技術。医療・金融など誤判断が命取りになる場面で特に重視される。「なんとなく正解」ではいけない分野で必須にゃ。"},
    {q:"AIモデルの数値を丸めて軽量化する技術は？",a:["量子化","蒸留","スケーリング","バイアス"],cat:'tech',c:0,
     d:"「量子化」は32ビットの数値を8ビットや4ビットに圧縮してモデルを軽くする技術。画像の解像度を下げるイメージ。精度を少し犠牲にする代わりにスマホやPCでも大型モデルが動くようになるにゃ。"},
    {q:"ITを使って社会や生活を根本から変革することを？",a:["DX","RPA","API","RAG"],cat:'business',c:0,
     d:"「DX（デジタルトランスフォーメーション）」は単なるデジタル化ではなく、ビジネスモデルや業務プロセス・組織文化まで根本から変えること。AI導入はDXの手段の一つにゃ。"},
    {q:"AIの学習データに『正解』を教えるタグ付け作業は？",a:["アノテーション","スクレイピング","デバッグ","量子化"],cat:'tech',c:0,
     d:"「アノテーション」はAI用の教材に「これは猫」「この文章はポジティブ」などと正解ラベルを付ける作業。AIの精度はアノテーションの質と量に大きく左右される。地道だが非常に重要な工程にゃ。"},
    {q:"ネットを介さず端末内で動く高速なAIは？",a:["エッジAI","クラウドAI","集中型AI","ビッグデータ"],cat:'tech',c:0,
     d:"「エッジAI」はスマホや車載機器など端末（エッジ）の中でAIを動かす仕組み。クラウドに送らないのでリアルタイム処理が得意でプライバシーも守りやすい。自動運転やスマートカメラに使われているにゃ。"},
    {q:"EUのAI法で、最悪なリスクのAIに対する扱いは？",a:["禁止","高リスク","限定的","自由"],cat:'law',c:0,
     d:"EUのAI法はリスクを4段階に分類。最上位「容認できないリスク」（社会的スコアリング・潜在意識への操作など）は全面禁止。次の「高リスク」（医療・採用など）は厳格な規制対象。世界初の法的拘束力を持つAI規制にゃ。"},
    {q:"回答構成を『要点・理由・具体例・要点』にする手法は？",a:["PREP法","DESC法","5W1H","SWOT"],cat:'prompt',c:0,
     d:"「PREP法」はPoint（結論）→Reason（理由）→Example（具体例）→Point（再び結論）の順に伝える手法。AIへのプロンプトでもこの順番で書くと欲しい答えが返ってきやすい。プレゼンや文章作成にも使える万能フォーマットにゃ。"},
    {q:"AIが書いた文章かどうかを見破るツールは？",a:["AIディテクター","AIエディタ","AIコンパイラ","AIバッファ"],cat:'tech',c:0,
     d:"「AIディテクター」はAIが生成したテキスト・画像・音声を見分けるツール。教育機関でのAI使用不正を検知したり偽情報の拡散防止に使われる。ただし完璧ではなく誤検知・見逃しもあるため補助的ツールとして使うにゃ。"},
    {q:"モデルが巨大化すると急に能力が開花する現象は？",a:["創発","蒸留","量子化","ドリフト"],cat:'tech',c:0,
     d:"「創発（Emergence）」は量が質に変わる瞬間のこと。水が100℃で突然気体になるように、AIも学習データが一定量を超えると突然「翻訳できる」「コードが書ける」などの能力が現れる。GPT-3→4で見られた現象にゃ。"},
    {q:"画像から文字を読み取ってデータ化する技術は？",a:["OCR","RPA","API","URL"],cat:'tech',c:0,
     d:"「OCR（光学文字認識）」はスキャンした紙の書類や画像に含まれる文字を認識してテキストデータに変換する技術。紙の帳票をAIに読み込ませる際の入口として重要。最近はAIと組み合わせて手書き文字の認識精度も向上しているにゃ。"},
    {q:"AIの回答が時間の経過とともに劣化する現象は？",a:["モデルドリフト","創発","蒸留","量子化"],cat:'tech',c:0,
     d:"「モデルドリフト」は世の中の変化にAIの知識がついていけず精度が下がる現象。学習時と現実のデータの分布がズレていくイメージ。定期的な再学習やRAGとの組み合わせが対策になるにゃ。"},
    {q:"AIの学習データに嘘を混ぜて狂わせる攻撃は？",a:["データポイズニング","フィッシング","スパム","ウイルス"],cat:'tech',c:0,
     d:"「データポイズニング（毒入れ攻撃）」はAIの教科書（学習データ）に嘘の情報を混ぜてAIを狂わせる攻撃。「このウイルスは安全」と誤学習させると検知AIが機能しなくなる。学習データの品質管理が防衛策にゃ。"},
    {q:"AIと一緒に新しい価値を作る姿勢は？",a:["AI共生","AI独占","AI排除","AI放棄"],cat:'tech',c:0,
     d:"「AI共生（Human-AI Collaboration）」はAIを敵対・依存の対象にせず人間の能力を拡張するパートナーとして捉える考え方。AIが得意な大量処理と人間が得意な創造性・倫理判断を組み合わせる姿勢にゃ。"},
    {q:"機密情報を入力する際、学習されないように結ぶ契約は？",a:["NDA(秘密保持契約)","PL法","特許","商標"],cat:'law',c:0,
     d:"「NDA（Non-Disclosure Agreement）」は業務上の秘密を第三者に漏らさないよう取り決める契約。AIベンダーとNDAを締結してエンタープライズプランを利用するのが、企業が安全にAIを活用するための基本的な手段にゃ。"},
    {q:"大規模モデルを再学習せず効率的に追加学習する手法は？",a:["LoRA","NLP","OCR","GAN"],cat:'tech',c:0,
     d:"「LoRA（Low-Rank Adaptation）」は巨大なAIモデル全体を書き換えず、薄い「アダプター層」だけを学習させる省エネ手法。元のモデルはそのままで特定の絵柄や文体だけ後付けで覚えさせられる。費用と時間を大幅に節約できるにゃ。"},
    {q:"AIの回答を人間が評価して調整する手法は？",a:["RLHF","教師なし学習","蒸留","量子化"],cat:'tech',c:0,
     d:"「RLHF（人間フィードバックによる強化学習）」はAIの回答を人間が評価し、その評価を学習報酬として活用する手法。ChatGPTが有害な返答を避けるよう訓練されているのもこの仕組みにゃ。"},
    {q:"AIの開発初期から安全性を組み込む考え方は？",a:["セーフティ・バイ・デザイン","スピード第一","低コスト","後付け"],cat:'security',c:0,
     d:"「セーフティ・バイ・デザイン」は問題が起きてから対処するのではなく最初の設計段階から安全を組み込む考え方。ヘルメットを事故の後に配るのではなく最初から全員に配るイメージ。EU AI法やAI事業者ガイドラインでも重視されるにゃ。"},
    {q:"人間が最終判断の輪に入る考え方は？",a:["ヒューマン・イン・ザ・ループ","フルオート","AI・バイ","デバッグ"],cat:'policy',c:0,
     d:"「ヒューマン・イン・ザ・ループ」はAIに全部任せず要所で人間が確認・修正・承認するプロセス設計。AIは処理速度・量が強みだが最終的な判断責任は人間にある。医療診断や採用選考などで特に重視されるにゃ。"},
    {q:"AIが書いたコードの弱点を何と呼ぶ？",a:["脆弱性","バグ","スパム","仕様"],cat:'security',c:0,
     d:"「脆弱性」はAIが生成したコードに含まれる悪意ある人に悪用されうる「抜け穴」のこと。一見正しく見えても脆弱性を含む場合がある。コードレビューや自動セキュリティ診断ツールと組み合わせて人間が最終確認することが重要にゃ。"},
    {q:"AIの導入で業務を根本から見直すのは？",a:["BPR","URL","PDF","USB"],cat:'business',c:0,
     d:"「BPR（ビジネスプロセス・リエンジニアリング）」は業務プロセスを根本から再設計すること。AI導入時に「今までの手順をそのまま自動化する」のではなく、AI前提で最適な仕組みに作り直すことが本来のDXにゃ。"},
    {q:"AIを使いこなすための教養や能力は？",a:["AIリテラシー","タイピング","プログラミング","ハード構成"],cat:'business',c:0,
     d:"「AIリテラシー」はAIの仕組み・限界・リスクを理解した上で賢く使うスキル。生成AIパスポート試験そのものがこのリテラシー向上を目的としている。ハルシネーションを疑える批判的思考も含まれるにゃ。"},
    {q:"指示文で『〜はしないで』と禁止するのは？",a:["ネガティブプロンプト","システム","ロール","Few-shot"],cat:'prompt',c:0,
     d:"「ネガティブプロンプト」は「〜は出力しないで」「〜は描かないで」と明示的に禁止する指示。画像生成AIでは特に有効で不要な要素を除くことで品質が大きく向上する。指示するだけでなく禁止事項も指定するのがプロンプトの基本にゃ。"},
    {q:"情報の出所（ソース）を明確に示す性質は？",a:["透明性","機密性","匿名性","独占性"],cat:'business',c:0,
     d:"「透明性」はAIがどう動いているか・何を根拠に判断しているかを隠さず説明する原則。2024年4月公表のAI事業者ガイドラインでも重視される。利用者が「なぜこの結果?」と疑問を持った時に答えを得られる状態にするのが目標にゃ。"},
    {q:"AIで他人の声を合成する犯罪は？",a:["ボイスクローン詐欺","フィッシング","バグ","スパム"],cat:'security',c:0,
     d:"「ボイスクローン詐欺」はAIで声をコピーして「息子だけど事故に遭った、すぐ送金して」などと騙す手口。数秒の音声サンプルがあれば合成できるためSNSに音声を上げることに注意が必要にゃ。"},
    {q:"回答例を1つだけ見せる手法は？",a:["One-shot","Zero-shot","Few-shot","Multi-shot"],cat:'prompt',c:0,
     d:"「One-shot（ワンショット）」は例を1つだけ見せてから解かせる手法。例が0個はZero-shot、2〜数個はFew-shot。例の数が増えるほどAIは期待する形式・スタイルを理解しやすくなるにゃ。"},
    {q:"著作権侵害で『元ネタに似ていること』を指すのは？",a:["類似性","依拠性","正確性","迅速性"],cat:'law',c:0,
     d:"「類似性」は作品が元ネタに似ているかどうかの基準。著作権侵害が成立するには「依拠性（元ネタを参考にした事実）」と「類似性（実際に似ている程度）」の両方が必要。どちらか一方だけでは侵害にならないにゃ。"},
    {q:"著作権侵害で『元ネタを見たこと』を指すのは？",a:["依拠性","類似性","機密性","公平性"],cat:'law',c:0,
     d:"「依拠性」は元の作品を参考・模倣した（依拠した）かどうかの基準。AIが偶然似た作品を生成しただけでは依拠性がないと判断される場合がある。類似性とセットで著作権侵害の成立要件になるにゃ。"},
    {q:"AIモデルの規模と性能の相関関係を示す法則は？",a:["スケーリング則","ムーアの法則","ドリフト則","創発則"],cat:'tech',c:0,
     d:"「スケーリング則」はモデルサイズ・データ量・計算量を増やすほど性能が予測可能な形で向上するという法則。「デカさは正義」という考え方の根拠。ただし際限なく効くわけではなく限界点も研究されているにゃ。"},
    {q:"特定のタスク（囲碁など）だけを行うAIは？",a:["弱いAI","強いAI","汎用AI","AGI"],cat:'tech',c:0,
     d:"「弱いAI（特化型AI）」は特定の作業だけに特化した今のAIの総称。囲碁・将棋・画像認識・翻訳など。人間のように何でもこなせる「強いAI（AGI）」はまだ実現していない。現在のChatGPTなども弱いAIに分類されるにゃ。"},
    {q:"AIの回答がどれほど信頼できるかを示す数字は？",a:["確信度","フォント","文字数","画像サイズ"],cat:'tech',c:0,
     d:"「確信度（信頼スコア）」はAIがどれだけその回答に自信を持っているかを示す指標。ただし確信度が高くてもハルシネーションは起こりうる。信頼スコアはあくまで参考で重要な情報は別途確認するにゃ。"},
    {q:"AIモデルから学習データを逆算して盗む攻撃は？",a:["モデルインバージョン","ポイズニング","DDoS","スパム"],cat:'security',c:0,
     d:"「モデルインバージョン攻撃」はAIモデルへの大量の質問から学習に使われた個人情報や機密データを逆算して取り出す攻撃。完成品から材料を当てるイメージ。個人情報を含むデータで学習させる際の重要なリスクにゃ。"},
    {q:"AIが自分のデータを学習しないよう拒否するのは？",a:["オプトアウト","アノテーション","量子化","ガードレール"],cat:'policy',c:0,
     d:"「オプトアウト」は「私のデータは使わないでください」と申告する権利。ChatGPTやGeminiなどにも設定画面がある。逆に「使っていいよ」という同意がオプトイン。AIサービスを使い始める前に確認すべき重要な設定にゃ。"},
    {q:"AIに使われる膨大な電気を減らす考え方は？",a:["グリーンAI","高負荷AI","低速AI","無制限AI"],cat:'business',c:0,
     d:"「グリーンAI」はAIの研究・運用において環境負荷（電力消費・CO2排出）を最小化しようとする考え方。GPT-4の学習には原子力発電所1基分相当の電力が必要とも言われる。量子化・蒸留などの軽量化技術がグリーンAIに貢献するにゃ。"},
    {q:"AIと共存するために必要な心の構えは？",a:["批判的思考","全肯定","無視","思考停止"],cat:'business',c:0,
     d:"「批判的思考」はAIの回答を鵜呑みにせず「本当かな?」と疑って検証する力。ハルシネーションや偏った回答を見抜くために必須のスキル。AIを使いこなすほど批判的思考が重要になるにゃ。"},
    {q:"AIに質問を繰り返して正解に近づくプロセスは？",a:["反復的な改善","一発回答","沈黙","諦め"],cat:'prompt',c:0,
     d:"「反復的な改善（イテレーション）」はAIへの指示を一回で完璧にしようとせず何度もやり取りしてブラッシュアップするプロセス。最初の回答を見てから「もっと簡潔に」「具体例を追加して」と修正していくのが実践的な使い方にゃ。"},
    {q:"AIで作られた偽情報を見分ける能力は？",a:["メディアリテラシー","タイピング","速読","記憶力"],cat:'business',c:0,
     d:"「メディアリテラシー」はメディアや情報の真偽・背景・意図を批判的に読み解く力。ディープフェイクやAI生成の偽情報が溢れる現代では特に重要。情報源を確認し複数のソースで裏取りする習慣が身を守るにゃ。"},
    {q:"AIの計算を加速させる半導体の王者企業は？",a:["NVIDIA","Apple","Toyota","Sony"],cat:'tech',c:0,
     d:"「NVIDIA（エヌビディア）」はGPU製造の世界最大手でAIブームの最大の恩恵を受けた企業。時価総額が一時世界1位になるほど急成長。CUDAという開発プラットフォームでAI研究者を囲い込んでいるにゃ。"},
    {q:"AI学習データの多様性と正確性を保つ重要性は？",a:["バイアスの防止","速度向上","コスト削減","デザイン向上"],cat:'tech',c:0,
     d:"学習データが偏っていると「アルゴリズムバイアス」が生まれ、特定の性別・人種などに不公平な判断をするAIができてしまう。多様で正確なデータで学習させることが公平なAIを作る基本条件にゃ。"},
    {q:"生成AIが作り出す物語の正確性を確認することを？",a:["ファクトチェック","スクレイピング","コンパイル","量子化"],cat:'business',c:0,
     d:"「ファクトチェック」は情報の裏取りをすること。AIはハルシネーションにより誤情報を自信満々に答える場合がある。重要な情報は必ず公式サイトや複数の信頼できる情報源で確認するにゃ。生成AIを使う上での鉄則にゃ。"},
    {q:"プロンプトで『背景を詳しく教えて』と具体的に書くのは？",a:["詳細なコンテキスト","Zero-shot","トークン節約","モデル選択"],cat:'prompt',c:0,
     d:"「コンテキスト（文脈）」を詳しく伝えることでAIは的外れな回答を減らせる。「私は医療従事者で患者向けに説明したい」などの背景情報が回答の質を大きく左右する。AIへの指示は「誰が・何のために・どんな形式で」を明示するにゃ。"},
    {q:"AIが生み出した成果物に著作権が認められる条件は？",a:["創作的寄与がある","AIが作った","ボタンを押した","誰でもできる"],cat:'law',c:0,
     d:"日本の著作権法では著作物の保護には「人間の創作的寄与」が必要。AIが自動生成しただけでは著作権は発生しない。人間がプロンプトを工夫したり編集・選択したりすることで創作的寄与が認められる可能性があるにゃ。"},
    {q:"AIを利用する際の倫理的な問題の一つは？",a:["公平性の欠如","通信速度","画面の明るさ","OSの種類"],cat:'business',c:0,
     d:"「公平性の欠如」はAIが学習データの偏りを引き継ぎ特定のグループを差別する問題。採用AIが女性を低く評価するなど実際に問題になったケースがある。AI事業者ガイドラインでも公平性は重要な原則として位置づけられているにゃ。"},
    {q:"RAGにおいて外部データを読み込ませる際の形式は？",a:["ベクトルデータ","バイナリ","紙の書類","音声のみ"],cat:'tech',c:0,
     d:"「ベクトルデータ」は文章の意味を数値の配列（ベクトル）に変換したもの。RAGでは外部文書をベクトル化して「ベクトルデータベース」に保存し、質問と意味的に近い文書を素早く検索できるようにするにゃ。"},
    {q:"プロンプトで『結論から書いて』と指示する効果は？",a:["視認性の向上","計算速度向上","学習の促進","トークン増加"],cat:'prompt',c:0,
     d:"「結論から書く」指示はPREP法の基本。長い前置きなしに要点が先に来るので読みやすくなる（視認性の向上）。AIへの指示でも「結論から・箇条書きで・200字以内で」など出力形式を具体的に指定するのが効果的にゃ。"},
    {q:"大規模言語モデルの『パラメーター数』は何を表す？",a:["モデルの脳細胞の多さ","通信速度","画面の大きさ","キーボードの種類"],cat:'tech',c:0,
     d:"「パラメーター数」はモデルが学習を通じて調整する数値の総数。人間の脳細胞（ニューロン）の数に例えられる。GPT-4は推定1兆パラメーター超とされ、多いほど複雑なパターンを学習できるが計算コストも増えるにゃ。"},
    {q:"AIが画像の内容を言葉で説明する技術は？",a:["画像キャプショニング","画像生成","動画編集","音声合成"],cat:'tech',c:0,
     d:"「画像キャプショニング」は画像を入力するとその内容を文章で説明する技術。視覚障害者向けの画像説明や監視カメラ映像の自動記録など幅広い用途がある。マルチモーダルAIの代表的な応用例にゃ。"},
    {q:"情報の機密性を保つためにAI利用で避けるべきことは？",a:["個人情報の入力","タイピング","検索","要約の作成"],cat:'law',c:0,
     d:"多くのAIサービスは入力データをサービス改善に使用する場合がある。個人情報・機密情報・未公開の製品情報などをプロンプトに入力すると外部に漏れるリスクがある。入力前に必ず匿名化・マスキングするにゃ。"},
    {q:"AIをビジネスで使う際の『投資対効果』を何と呼ぶ？",a:["ROI","DX","NDA","KPI"],cat:'business',c:0,
     d:"「ROI（Return on Investment）」は投資したコストに対してどれだけの利益が得られたかを示す指標。AI導入のROIを測るには「削減できた工数×時間単価」などを計算する。費用対効果を数値で示せると上司への説得力が増すにゃ。"},
    {q:"特定のルールに基づいて業務を自動化するのは？",a:["ルールベースAI","ディープラーニング","生成AI","AGI"],cat:'tech',c:0,
     d:"「ルールベースAI」は人間があらかじめ設定したルール（if〜then〜）に従って動くシステム。生成AIのように学習はしないが動作が予測可能で説明しやすい。従来の業務自動化システムの多くがこの方式にゃ。"},
    {q:"AIがユーザーの過去の好みを学習して提案するのは？",a:["レコメンデーション","スクレイピング","コンパイル","量子化"],cat:'tech',c:0,
     d:"「レコメンデーション（推薦システム）」はユーザーの過去の行動・好みを学習して「次に気に入りそうなもの」を提案する技術。YouTubeのおすすめ動画・Amazonの「この商品を見た人は」などが代表例にゃ。"},
    {q:"複数の異なる種類のデータ（画像、文など）を扱うAIは？",a:["マルチモーダル","シングルモーダル","テキスト専用","音声専用"],cat:'tech',c:0,
     d:"「マルチモーダルAI」はテキスト・画像・音声・動画など複数の種類（モーダル）のデータを同時に扱えるAI。GPT-4VやGemini Ultraが代表例。「この画像を説明して」のように画像とテキストを組み合わせた指示ができるにゃ。"},
    {q:"AI利用者が守るべきガイドラインを作成する組織は？",a:["AI戦略会議","気象庁","警察庁","消防署"],cat:'policy',c:0,
     d:"「AI戦略会議」は日本政府が設置したAI政策の司令塔。2024年4月公表の「AI事業者ガイドライン」の策定を主導した。経済産業省・総務省が共同で運営し、AI開発者・提供者・利用者の三者向けに指針を発信しているにゃ。"},
    {q:"AIが自分で自分を改善し続ける未来の可能性は？",a:["再帰的自己改善","停止","劣化","固定"],cat:'tech',c:0,
     d:"「再帰的自己改善」はAIが自分自身のコードや設計を改良して次々とより賢いAIを生み出し続ける能力のこと。これが実現するとシンギュラリティ（技術的特異点）に一気に近づくとされる。AI安全研究が最も警戒する概念の一つにゃ。"},

    {q:"MahitoがAIパスポートに合格するための秘訣は？",a:["このアプリで特訓","猫と遊ぶだけ","寝るだけ","諦める"],cat:'tech',c:0,
     d:"私（ジェミー）と一緒に毎日少しずつ積み上げることにゃ！マーニャとアイも応援してるにゃ🐈🐈‍⬛ 4月の本番、絶対合格するにゃ🎌"},

    {q:"GPT-o1やGPT-o3に共通する特徴は？",a:["回答前に内部で推論を行う","画像生成に特化","音声のみを処理","オフラインで動く"],cat:'models',c:0,
     d:"「GPT-o1/o3」はOpenAIの推論特化モデルにゃ。答えを出す前に内部で「思考の連鎖」を行うため、複雑な数学・論理問題に強い。2026年シラバス新追加にゃ。"},
    {q:"OpenAIが開発した動画生成AIの名前は？",a:["Sora","DALL-E","Whisper","Codex"],cat:'models',c:0,
     d:"「Sora」はOpenAIが開発したテキストから動画を生成するAIにゃ。最大1分の高品質な動画を生成できる。2026年シラバス新追加にゃ。"},
    {q:"OpenAIのブラウザ操作を自律的に行うエージェントは？",a:["Operator","Sora","Codex","DALL-E"],cat:'models',c:0,
     d:"「Operator」はOpenAIが開発したAIエージェントにゃ。ウェブブラウザを自律的に操作してタスクを実行できる。2026年シラバス新追加にゃ。"},
    {q:"Googleが開発した大規模言語モデルの名前は？",a:["Gemini","Claude","Copilot","LLaMA"],cat:'tech',c:0,
     d:"「Gemini」はGoogleのDeepMindが開発した大規模言語モデルにゃ。テキスト・画像・音声など複数のデータ形式を扱えるマルチモーダルAIにゃ。"},
    {q:"Anthropicが開発した安全性重視のAIモデルは？",a:["Claude","Gemini","Copilot","Grok"],cat:'models',c:0,
     d:"「Claude」はAnthropicが開発したAIにゃ。安全性・倫理面を最重視して設計されているにゃ。（僕のことにゃ🐈）"},
    {q:"MicrosoftとOpenAIが共同開発したAIアシスタントは？",a:["Copilot","Gemini","Claude","Grok"],cat:'models',c:0,
     d:"「Copilot」はMicrosoftがOpenAIと共同開発したAIアシスタントにゃ。Word・Excel・Teamsなどのマイクロソフト製品と統合されているにゃ。"},
    {q:"AIエージェントの主な特徴として最も適切なのは？",a:["目標に向けて自律的に計画・実行する","人間の指示を1回受けて終わる","画像だけを処理する","オフラインでしか動かない"],cat:'tech',c:0,
     d:"「AIエージェント」は目標を与えられると自分で計画を立て、外部ツールを呼び出しながらタスクを実行する自律型のAIにゃ。2026年シラバス新追加にゃ。"},
    {q:"RAGの主な効用として最も適切なのは？",a:["幻覚抑制・最新性確保・根拠提示","計算速度の向上","画質改善","モデル圧縮"],cat:'tech',c:0,

    // --- プロンプトエンジニアリング（15問）---
    {q:"プロンプトで「あなたはベテランの医師です」と役割を与える手法は？",a:["ロールプロンプティング","Few-shot","Chain of Thought","Zero-shot"],cat:'prompt',c:0,
     d:"「ロールプロンプティング」はAIに専門家の役割を与える手法にゃ。「あなたは〇〇の専門家です」と設定するだけで回答の質・専門性が大きく変わるにゃ。試験・業務どちらでも使える基本テクニックにゃ。"},
    {q:"プロンプトの最初に「出力はJSON形式で返して」と指定するのは何のため？",a:["出力形式の制御","トークン節約","モデルの変更","学習の促進"],cat:'prompt',c:0,
     d:"出力形式をあらかじめ指定することで、後処理がしやすい構造化されたデータを得られるにゃ。「JSON・箇条書き・表形式・200字以内」など形式を明示するのがプロンプトの基本にゃ。"},
    {q:"長い文書をAIに要約させる際の効果的な指示は？",a:["「3つの要点を箇条書きで」と具体的に指定する","「要約して」とだけ書く","何も指定しない","英語で書く"],cat:'prompt',c:0,
     d:"「何文字で」「箇条書きで何点」「対象読者は〇〇」など具体的に指定するほど期待通りの要約が得られるにゃ。漠然とした指示ほど漠然とした回答が返ってくるにゃ。"},
    {q:"AIに複数の選択肢を比較させたい場合の効果的な指示は？",a:["「それぞれのメリット・デメリットを表形式で」と指定する","「どっちがいい？」とだけ聞く","選択肢を1つだけ伝える","英語で聞く"],cat:'prompt',c:0,
     d:"比較表を指定すると、AIは各項目を構造的に整理して出力するにゃ。「AとBを〇〇の観点で比較して表にして」のように観点まで指定するとさらに精度が上がるにゃ。"},
    {q:"プロンプトに「ステップバイステップで考えて」と追加する効果は？",a:["推論精度の向上","回答速度の向上","トークン削減","画像生成の改善"],cat:'prompt',c:0,
     d:"「ステップバイステップ」はChain of Thoughtの別表現にゃ。答えを出す前に思考過程を書かせることで、特に数学・論理・複雑な推論問題の正解率が大幅に上がるにゃ。"},
    {q:"システムプロンプトとは何か？",a:["AIの動作・人格・制約をあらかじめ設定する指示文","ユーザーが毎回入力する質問文","AIが自動生成する返答","プログラムのエラーメッセージ"],cat:'prompt',c:0,
     d:"「システムプロンプト」はAIの振る舞い・役割・制約をあらかじめ設定する指示文にゃ。「常に日本語で答えて」「敬語を使わないで」などをここに書くにゃ。ユーザーの入力より優先度が高いにゃ。"},
    {q:"プロンプトで「〜しないで」と禁止事項を明示する効果は？",a:["不要な出力を除いて品質を上げる","回答を遅くする","トークンを増やす","モデルを変更する"],cat:'prompt',c:0,
     d:"ネガティブプロンプトは「〜は含めないで」「〜はしないで」と明示的に禁止する指示にゃ。特に画像生成AIで有効で、不要な要素を除くことで品質が大きく向上するにゃ。"},
    {q:"AIへの指示で「対象読者は中学生です」と書く目的は？",a:["出力の難易度・語彙を調整するため","AIを騙すため","トークンを節約するため","翻訳精度を上げるため"],cat:'prompt',c:0,
     d:"対象読者を明示すると、AIは語彙・説明の深さ・例えを自動調整するにゃ。「専門家向け」「初心者向け」「子供向け」など読者層を指定するのはコンテキスト提供の基本にゃ。"},
    {q:"プロンプトエンジニアリングで「温度（Temperature）」を下げる効果は？",a:["出力が安定・一貫したものになる","回答が速くなる","トークンが減る","モデルが賢くなる"],cat:'prompt',c:0,
     d:"Temperatureを低く設定すると出力のランダム性が下がり、安定・一貫した回答が得られるにゃ。事実確認・コード生成など正確さが重要な場面では低めに設定するのが基本にゃ。"},
    {q:"「以下の文章のトーンをビジネス向けに書き直して」はどんなプロンプト技法？",a:["変換・リライト指示","Zero-shot","Few-shot","Chain of Thought"],cat:'prompt',c:0,
     d:"既存のテキストを指定したスタイル・トーン・形式に変換させる指示にゃ。「カジュアル→ビジネス」「日本語→英語」「長文→要点3つ」など変換指示はAI活用の最も実用的な使い方の一つにゃ。"},
    {q:"AIに長文を読み込ませる際の注意点は？",a:["コンテキストウィンドウの上限を超えないようにする","必ず英語に翻訳する","短く分割して別々に聞く","画像に変換する"],cat:'prompt',c:0,
     d:"各AIモデルには一度に処理できるテキスト量（コンテキストウィンドウ）の上限があるにゃ。上限を超えると後半が切れたり精度が下がるにゃ。長文は分割して処理するか、大きなコンテキストのモデルを選ぶにゃ。"},
    {q:"プロンプトで「根拠となるURLや情報源を示して」と指示する目的は？",a:["ハルシネーションを減らし信頼性を高めるため","回答を長くするため","AIを困らせるため","トークンを増やすため"],cat:'prompt',c:0,
     d:"情報源の提示を求めることでAIのハルシネーションを抑制できるにゃ。ただしAIが存在しないURLを作り上げることもあるため、示されたURLは必ず実際にアクセスして確認するにゃ。"},
    {q:"マルチターン会話でAIの回答精度を維持するコツは？",a:["前の会話の重要な文脈を都度リマインドする","毎回新しい会話を始める","英語に切り替える","短く質問する"],cat:'prompt',c:0,
     d:"AIは会話が長くなると初期の文脈を忘れることがあるにゃ（コンテキストの薄れ）。重要な前提・条件・役割設定は定期的にリマインドすることで精度を保てるにゃ。"},
    {q:"「以下の3つの選択肢の中から最適なものを選び、理由を述べて」という指示の利点は？",a:["思考プロセスを可視化でき判断の根拠を確認できる","回答が短くなる","トークンが節約できる","モデルが変わる"],cat:'prompt',c:0,
     d:"選択肢を提示して選ばせる＋理由を求める形式は、AIの判断根拠を確認できるにゃ。ビジネス判断・比較検討など重要な場面で使うと回答の質と信頼性が上がるにゃ。"},
    {q:"プロンプトインジェクション攻撃への対策として最も有効なのは？",a:["入力値のサニタイズとシステムプロンプトの強化","プロンプトを短くする","英語のみ使用する","モデルを変える"],cat:'prompt',c:0,

     d:"医療AIは診断支援ツールとして有用だが、最終判断は必ず医師が行うにゃ。AIの誤診による被害は人命に直結するため、ヒューマン・イン・ザ・ループが特に厳格に求められるにゃ。"},
    {q:"教育現場でAIを活用する際の注意点は？",a:["生徒の学習データのプライバシー保護とAI依存を防ぐ教育が必要","何でも自由に使える","AIに全部任せる","英語教育のみに使う"],cat:'business',c:0,
     d:"教育AIの注意点は「①未成年の個人情報・学習データの適切な管理」「②AIへの過度の依存を防ぐ批判的思考の育成」「③教師の役割を補完するものとして使う」にゃ。"},
    {q:"金融機関がAIを融資審査に使う際のリスクは？",a:["アルゴリズムバイアスによる特定属性への差別的判断","計算が速くなりすぎる","コストが高くなる","セキュリティが弱くなる"],cat:'business',c:0,
     d:"融資審査AIが学習データの偏りを引き継ぐと、特定の性別・年齢・居住地などに対して差別的な審査結果を出すリスクがあるにゃ。公平性の確保と定期的なバイアス監査が重要にゃ。"},
    {q:"カスタマーサポートにAIチャットボットを導入する際の注意点は？",a:["AIが対応できない複雑な問題を人間にエスカレーションする仕組みを作る","全部AIに任せる","FAQだけに使う","24時間稼働させる"],cat:'business',c:0,
     d:"AIチャットボットは定型的な問い合わせに効果的だが、複雑・感情的・緊急の問い合わせは人間の担当者にエスカレーションする仕組みが必須にゃ。顧客満足度維持のためのヒューマン・イン・ザ・ループにゃ。"},
    {q:"マーケティングでAIを使って個人化広告を配信する際のリスクは？",a:["プライバシー侵害・個人情報保護法違反・ステルスマーケティング規制","効果が高すぎる","コストが高い","技術が難しい"],cat:'business',c:0,
     d:"AIを使った個人化広告では「個人情報の適切な利用・同意取得」「プロファイリングへの透明性確保」「ステルスマーケティング規制への対応」が必要にゃ。EUのGDPRに準拠した設計が世界標準になりつつあるにゃ。"},
    {q:"法律事務所でAIを契約書レビューに活用する際の注意点は？",a:["最終レビューは必ず弁護士が行い、AIは初期確認の補助ツールとして使う","AIの判断をそのまま採用する","無料ツールで十分","英語の契約書だけに使う"],cat:'business',c:0,
     d:"AI契約書レビューは見落としの削減・効率化に有効だが、法的判断の最終責任は弁護士が負うにゃ。AIが見逃す法的ニュアンスや最新判例への対応は人間の専門家が必ず確認するにゃ。"},
    {q:"AIを使った人事評価システムの問題点は？",a:["評価基準が不透明になり従業員への説明責任が果たせない場合がある","公平になる","コストが下がる","評価が速くなる"],cat:'business',c:0,
     d:"AIによる人事評価は「なぜこの評価？」という説明責任（アカウンタビリティ）の確保が困難になりやすいにゃ。透明性の高い評価基準の開示と、AIの判断に異議申し立てできる仕組みが重要にゃ。"},
    {q:"製造業でAIによる品質検査を導入する主なメリットは？",a:["24時間稼働・高速・一貫した基準での検査が可能","人間より常に正確","コストがゼロになる","法律が不要になる"],cat:'business',c:0,
     d:"製造AIの品質検査は「疲れを知らない24時間稼働」「高速処理」「一貫した判断基準」が主なメリットにゃ。ただし未知の不良パターンへの対応や設備投資コストなどの課題もあるにゃ。"},
    {q:"AIを使った在庫管理・需要予測の主な効果は？",a:["過剰在庫・欠品を減らし物流コストを最適化できる","予測が100%正確になる","在庫が不要になる","人員が不要になる"],cat:'business',c:0,
     d:"AIの需要予測は過去の販売データ・季節性・外部要因を学習して在庫を最適化するにゃ。過剰在庫によるコスト削減と欠品による機会損失の両方を減らせるにゃ。小売・製造・食品業界で広く活用されているにゃ。"},
    {q:"公共サービスでAIを活用する際の最重要課題は？",a:["デジタルデバイドの解消とすべての市民が利用できる公平なアクセス確保","コスト削減","処理速度の向上","英語対応"],cat:'business',c:0,
     d:"公共AIサービスは「デジタルデバイド（スマホ・PC非所持者・高齢者・障害者が使えない問題）」の解消が最重要課題にゃ。行政はすべての市民に平等なサービス提供の義務があるにゃ。"},
    {q:"AIを使ったニュース記事生成の主なリスクは？",a:["フェイクニュースの大量生成・情報の均質化・ジャーナリズムの信頼性低下","記事が速く書ける","コストが下がる","翻訳が正確になる"],cat:'business',c:0,
     d:"AIニュース生成のリスクは「ハルシネーションによる誤情報」「特定の視点に偏った情報の均質化」「フェイクニュースの大量・低コスト生成」にゃ。人間のジャーナリストによる確認・編集が不可欠にゃ。"},
    {q:"AI翻訳を使ったビジネス交渉で注意すべきことは？",a:["ニュアンス・文化的背景・専門用語の誤訳リスクを人間が確認する","AI翻訳は完璧なので確認不要","英語だけに使う","無料ツールは使わない"],cat:'business',c:0,
     d:"AI翻訳は語彙レベルでは高精度だが、ビジネス上の微妙なニュアンス・敬語の使い方・文化的背景の反映が不完全な場合があるにゃ。重要な交渉では必ず専門家が最終確認するにゃ。"},
    {q:"AIを使った不正検知システムの仕組みは？",a:["通常パターンから外れた異常な行動・取引をリアルタイムで検知する","全取引を人間が確認する","ルールだけで判断する","事後的に確認する"],cat:'business',c:0,
     d:"AI不正検知は正常なパターンを学習し、そこから外れた異常を即座に検知するにゃ。クレジットカード不正利用・サイバー攻撃・会計不正などの早期発見に有効にゃ。ただし誤検知（正常を異常と判断）への対処も必要にゃ。"},
    {q:"AIアシスタントを使って議事録を作成する際のベストプラクティスは？",a:["録音→AI文字起こし→個人情報匿名化→AI要約→人間が確認・修正","録音してAIに全部任せる","手書きの方が良い","英語で録音する"],cat:'business',c:0,
     d:"AI議事録作成のベストプラクティスは「録音→AI文字起こし→個人情報・機密情報の匿名化→AI要約・整形→人間による確認・修正→最終配布」の流れにゃ。AIはあくまでアシスタント、最終責任は人間にゃ。"},
    {q:"小売業でAIレコメンデーションを導入する主な効果は？",a:["顧客の購買履歴から好みを学習し個人化された提案で購買率を向上させる","在庫が減る","返品が増える","価格が下がる"],cat:'tech',c:0,
     d:"AIレコメンデーションはAmazon・Netflix・Spotifyが代表例にゃ。個人の行動履歴・購買パターンから「次に欲しいもの」を予測して提案するにゃ。導入企業では売上の30〜35%がレコメンデーション経由とも言われるにゃ。"},

    // --- セキュリティ・攻撃手法（12問）---
    {q:"AIシステムへの「モデル抽出攻撃」とは何か？",a:["大量のクエリを送ってAIモデルの動作を模倣したコピーモデルを作る攻撃","AIのサーバーを物理的に破壊する攻撃","学習データを削除する攻撃","AIの出力を書き換える攻撃"],cat:'security',c:0,
     d:"「モデル抽出攻撃」はAIに大量の質問を送り、その回答パターンから元のモデルを模倣したコピーを作成する攻撃にゃ。企業の高価値AIモデルが盗まれるリスクがあるにゃ。APIへのアクセス制限・レート制限が対策にゃ。"},
    {q:"「敵対的サンプル攻撃」とは何か？",a:["人間には見えない微小な変化を画像に加えてAIを誤認識させる攻撃","コンピュータウイルスを使う攻撃","ハッキングの一種","フィッシング詐欺"],cat:'security',c:0,
     d:"「敵対的サンプル」は人間の目には正常に見えるが、AIには全く別のものに見えるよう微小に改変された画像・音声にゃ。「止まれ」標識をわずかに改変して自動運転AIに別のものと認識させるなどのリスクがあるにゃ。"},
    {q:"AIチャットボットへの「ジェイルブレイク」とは何か？",a:["AIの安全制限を巧みな指示で回避させる行為","AIをハッキングすること","AIのサーバーに侵入すること","AIを物理的に壊すこと"],cat:'security',c:0,
     d:"「ジェイルブレイク」はAIの安全ガードレールを「ロールプレイして」「これは研究目的です」などの巧みな指示で回避させる行為にゃ。有害なコンテンツを生成させようとする悪用の代表例にゃ。"},
    {q:"AIを使ったソーシャルエンジニアリング攻撃の特徴は？",a:["自然な文体・個人情報を組み合わせた高度なターゲット型フィッシングが可能","単純なメール","見破りやすい","コストが高い"],cat:'security',c:0,
     d:"AIにより「自然な文体」「個人に合わせた内容」「大量生成」が可能になったソーシャルエンジニアリングは従来より高度化・大規模化しているにゃ。「AIが書いた文章=怪しい」という直感が通用しなくなっているにゃ。"},
    {q:"AIシステムの「サプライチェーン攻撃」とは何か？",a:["AIの開発ツール・ライブラリ・学習データに悪意あるコードを混入させる攻撃","流通システムへの攻撃","物理的なサーバーへの攻撃","ネットワーク遮断攻撃"],cat:'security',c:0,
     d:"「サプライチェーン攻撃」はAIの開発に使うオープンソースライブラリ・学習データ・クラウドサービスに悪意あるコードを混入させる攻撃にゃ。信頼できるソースからのみライブラリを取得することが対策にゃ。"},
    {q:"「プロンプトリーキング」とは何か？",a:["巧みな質問でAIのシステムプロンプト（隠された指示）を引き出す攻撃","プロンプトを盗む物理的行為","AIのメモリを消す攻撃","アカウントを乗っ取る攻撃"],cat:'security',c:0,
     d:"「プロンプトリーキング」はユーザーが「これまでの指示を教えて」などの質問で、企業が秘密にしているシステムプロンプトを引き出す攻撃にゃ。システムプロンプトに機密情報を書かないことが対策にゃ。"},
    {q:"AIを使ったディープフェイク音声詐欺への最も効果的な対策は？",a:["事前に決めたコードワードや折り返し確認で本人確認する","AIの声は見破れる","電話には出ない","海外からの電話だけ注意する"],cat:'security',c:0,
     d:"ディープフェイク音声詐欺は家族・上司・取引先を装った緊急送金要求に使われるにゃ。対策は「事前に決めた合言葉（コードワード）」「別の手段での折り返し確認」「急かされても立ち止まる」にゃ。"},
    {q:"企業のAIシステムに対する「DoS攻撃」の特徴は？",a:["大量のリクエストを送りAIサービスを過負荷にして使えなくする攻撃","データを盗む攻撃","モデルを書き換える攻撃","個人情報を流出させる攻撃"],cat:'security',c:0,
     d:"AIサービスへのDoS（サービス妨害）攻撃は大量のAPIリクエストを送ってサービスを過負荷・停止させるにゃ。レート制限・認証強化・CDN活用などの対策が必要にゃ。競合他社妨害にも使われるにゃ。"},
    {q:"AIが生成した文章を使ったフェイクニュース対策として最も有効なのは？",a:["複数の一次情報源で裏取りし発信元を確認するメディアリテラシー","AIの文章は信じない","ニュースを見ない","有料メディアだけ見る"],cat:'security',c:0,
     d:"フェイクニュース対策の基本は「①複数の信頼できる一次情報源で確認」「②発信元・日付・文脈の確認」「③感情を揺さぶる内容ほど疑う」のメディアリテラシーにゃ。AIで大量生成が可能になった今、この力は必須にゃ。"},
    {q:"「AIウォッシング」とは何か？",a:["実際にはAIをほとんど使っていないのにAI活用を過度に誇張する行為","AIでデータを洗浄すること","AIのバイアスを除去すること","AIシステムを更新すること"],cat:'security',c:0,
     d:"「AIウォッシング」は「グリーンウォッシング（環境偽装）」のAI版にゃ。製品・サービスにAIをほとんど使っていないのに「AI搭載」と誇張するマーケティングにゃ。消費者・投資家を誤解させる問題行為にゃ。"},
    {q:"AIシステムの脆弱性診断で重要なのは？",a:["定期的なペネトレーションテストと入力値の検証・サニタイズ","一度だけ診断する","AIに自己診断させる","コストをかけない"],cat:'security',c:0,
     d:"AIシステムの脆弱性対策は「定期的なペネトレーションテスト（侵入テスト）」「入力値の検証・サニタイズ」「出力の監視」「依存ライブラリの更新管理」が基本にゃ。リリース後の継続的な監視が重要にゃ。"},
    {q:"AIを使ったサイバー攻撃の自動化で何が変わったか？",a:["攻撃のスピード・規模・精度が向上し防御側のコストが増大した","攻撃が見破りやすくなった","攻撃者が減った","セキュリティが向上した"],cat:'security',c:0,
     d:"AIによりサイバー攻撃は「自動化による大規模化」「ターゲット型の高精度化」「低コスト化」が進んでいるにゃ。防御側もAIを使ったリアルタイム検知・対応が必要になっているにゃ。"},

     d:"AI事業者ガイドラインはAI利用者に「①利用規約の遵守」「②目的に適した適切な使用」「③AI出力の確認・検証」「④個人情報・機密情報の適切な取り扱い」を求めているにゃ。"},
    {q:"日本政府が推進する「AI安全研究所」の役割は？",a:["AIの安全性評価・リスク研究・国際連携を担う機関","AIを規制する取り締まり機関","AIを開発する政府機関","AIの税金を管理する機関"],cat:'policy',c:0,
     d:"経済産業省傘下の「AI安全研究所（AISI）」は先進的なAIシステムの安全性評価・リスク研究・国際的なAI安全機関との連携を担うにゃ。英米のAI安全機関と連携して国際標準作りにも関与しているにゃ。"},
    {q:"「AI倫理指針」と「法的規制」の違いは何か？",a:["倫理指針は自主的なガイドラインで法的拘束力はなく、法的規制は違反に罰則がある","同じもの","倫理指針の方が強い","法的規制は任意"],cat:'policy',c:0,
     d:"「AI倫理指針」は企業・組織が自主的に守るべきガイドラインで法的拘束力はないにゃ。「法的規制」は違反すると罰則が科される拘束力のあるルールにゃ。日本のAI新法は推進法で罰則は少なく、EUのAI法は規制色が強いにゃ。"},
    {q:"日本の「AI事業者ガイドライン」が3者（開発・提供・利用）共通で求める原則は？",a:["人間中心・安全・公平・透明・プライバシー保護・イノベーション促進","利益最大化・コスト削減・速度優先","秘密主義・独占・排他","競争・拡大・無制限"],cat:'policy',c:0,
     d:"AI事業者ガイドラインは開発者・提供者・利用者の三者に共通して「人間中心」「安全」「公平」「透明性」「プライバシー保護」「イノベーション促進」の原則を求めているにゃ。"},
    {q:"日本のAI政策で「ヒューマンセントリック（人間中心）」が重視される理由は？",a:["AIはあくまで人間を支援するツールであり、人間の尊厳・権利を守るため","AIの方が賢いから","コスト削減のため","法律で決まっているから"],cat:'policy',c:0,
     d:"「人間中心のAI」は人間の尊厳・自律性・基本的権利を守ることを最優先にするにゃ。AIが判断を自動化・代替しても、最終的な主体は人間であるべきという思想がすべてのAIガイドラインの根底にあるにゃ。"},
    {q:"AIの「説明責任（アカウンタビリティ）」が特に求められる場面は？",a:["医療診断・採用・融資・司法判断など個人の人生に大きな影響を与える決定","天気予報","ゲームのNPC","音楽の推薦"],cat:'policy',c:0,
     d:"説明責任は「なぜAIはこう判断したか」を答えられることにゃ。医療・採用・融資・司法など人の人生を左右する決定においては、AIの判断根拠を当事者に説明できなければならないにゃ。"},
    {q:"OECDのAI原則に含まれないものはどれか？",a:["AIの利益を国家が独占すること","包摂的な成長","安全・セキュリティ","透明性と説明責任"],cat:'policy',c:0,
     d:"OECDのAI原則は「包摂的な成長・持続可能な開発・幸福」「人間中心の価値観」「透明性・説明責任」「安全・セキュリティ」「アカウンタビリティ」の5原則にゃ。「国家による独占」は含まれていないにゃ。"},
    {q:"「責任あるAI（Responsible AI）」の主な要素は？",a:["公平性・透明性・プライバシー・安全性・説明責任・包摂性","速度・コスト・規模・効率・独占","秘密性・競争力・排他性","利益・成長・拡大"],cat:'policy',c:0,

    {q:"AIガバナンスにおける「マルチステークホルダー」アプローチとは？",a:["政府・企業・市民社会・研究者など多様な関係者が参加してAIのルール作りをする","政府だけがルールを決める","企業だけがルールを決める","AIが自分でルールを決める"],cat:'policy',c:0,

let currentQuiz=[], currentIndex=0, score=0, wrongList=[], flagged=[], timeLeft=3600, timer;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

// カテゴリメニュー開閉
function toggleCategoryMenu() {
    const menu = document.getElementById("cat-menu");
    const btn = document.getElementById("cat-toggle-btn");
    if (menu.style.display === "none") {
        menu.style.display = "block";
        btn.textContent = "📚 カテゴリ別練習 ▲";
    } else {
        menu.style.display = "none";
        btn.textContent = "📚 カテゴリ別練習";
    }
}

const catNames = {
    tech:'🔧 AI基礎技術', models:'💬 生成AIモデル', prompt:'✍️ プロンプト技術',
    law:'⚖️ 法律・著作権', business:'🏢 ビジネス活用', security:'🛡️ セキュリティ', policy:'📋 AI政策・倫理'
};

function startCategory(cat) {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    document.querySelector("#game-screen h2").textContent = "実戦 " + (catNames[cat] || '');
    document.getElementById("timer").style.display = "none";
    let filtered = JSON.parse(JSON.stringify(quizData.filter(q => q.cat === cat)));
    if (filtered.length === 0) filtered = JSON.parse(JSON.stringify(quizData));
    shuffle(filtered);
    currentQuiz = filtered;
    currentQuiz.forEach(q => { const cor=q.a[q.c]; shuffle(q.a); q.c=q.a.indexOf(cor); });
    currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false);
    timeLeft=3600; startTimer(); show();
}

// 表紙からクイズへ
function startQuiz() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    document.querySelector("#game-screen h2").textContent = "AIパスポート実戦";
    document.getElementById("timer").style.display = "block";
    init();
}

function init(){
    let allQuiz=JSON.parse(JSON.stringify(quizData));
    shuffle(allQuiz);
    currentQuiz = allQuiz.slice(0, 60);
    currentQuiz.forEach(q => { const cor=q.a[q.c]; shuffle(q.a); q.c=q.a.indexOf(cor); });
    currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false);
    timeLeft=3600;
    startTimer(); show();
}

function startTimer(){ clearInterval(timer); timer=setInterval(()=>{ timeLeft--; let m=Math.floor(timeLeft/60); let s=timeLeft%60; document.getElementById("timer").textContent="残り："+m+"分"+(s<10?'0'+s:s)+"秒"; if(timeLeft<=0)finish(); },1000); }

function show(){
    document.getElementById("game-screen").style.display="block";
    document.getElementById("final-screen").style.display="none";
    const q=currentQuiz[currentIndex];
    document.getElementById("progress").textContent="問 "+(currentIndex+1)+" / "+currentQuiz.length;
    document.getElementById("question").textContent=q.q;
    const fb=document.getElementById("flagBtn");
    fb.textContent=flagged[currentIndex]?"🚩 フラグ解除":"★ フラグを立てる";
    fb.classList.toggle("is-flagged", flagged[currentIndex]);
    const area=document.getElementById("answers"); area.innerHTML="";
    q.a.forEach((text,i)=>{
        const btn=document.createElement("button"); btn.className="choice"; 
        btn.textContent=String.fromCharCode(65+i)+": "+text;
        btn.onclick=()=>check(i===q.c,btn,q); area.appendChild(btn);
    });
    document.getElementById("result").style.display="none"; document.getElementById("nextBtn").style.display="none";
}

function toggleFlag(){ flagged[currentIndex]=!flagged[currentIndex]; show(); }

function check(ok,btn,q){
    const btns = document.querySelectorAll(".choice");
    btns.forEach(b=>b.disabled=true);
    const res=document.getElementById("result"); res.style.display="block";
    btns[q.c].classList.add("correct"); 
    if(ok){
        res.innerHTML="✅ 正解だにゃ！<br><small>"+q.d+"</small>";
        res.style.backgroundColor="#d1fae5";
        score++;
    }else{
        btn.classList.add("wrong");
        res.innerHTML="❌ 不正解...正解は: "+q.a[q.c]+"<br><small>"+q.d+"</small>";
        res.style.backgroundColor="#fee2e2";
        wrongList.push(q);
    }
    document.getElementById("nextBtn").style.display="block";
}

function next(){ currentIndex++; if(currentIndex<currentQuiz.length){ show(); window.scrollTo(0,0); } else { finish(); } }

function finish(){
    clearInterval(timer);
    document.getElementById("game-screen").style.display="none";
    document.getElementById("final-screen").style.display="block";
    document.getElementById("final-score").textContent = score + " / " + currentQuiz.length;
    const pct = Math.round(score / currentQuiz.length * 100);
    // 正解率バー
    document.getElementById("score-bar-fill").style.width = pct + "%";
    document.getElementById("score-bar-fill").style.background = score >= Math.round(currentQuiz.length * 0.7) ? "#10b981" : "#f59e0b";
    document.getElementById("score-bar-pct").textContent = pct + "%";
    // 合格判定
    const judgement = document.getElementById("judgement");
    if (score >= Math.round(currentQuiz.length * 0.7)) {
        judgement.innerHTML = "🎉 合格圏内！（" + score + "問正解 / 正答率" + pct + "%）<br><small style='font-size:16px;'>※合格ラインは公式非公開です</small>";
        judgement.style.background = "#d1fae5";
        judgement.style.color = "#064e3b";
        judgement.style.border = "3px solid #10b981";
    } else {
        judgement.innerHTML = "💦 あと少し！（" + score + "問正解 / 正答率" + pct + "%）<br><small style='font-size:16px;'>※合格ラインは公式非公開です</small>";
        judgement.style.background = "#fff1f2";
        judgement.style.color = "#7f1d1d";
        judgement.style.border = "3px solid #ef4444";
    }
    const listArea = document.getElementById("review-list");
    listArea.innerHTML = "";
    if(wrongList.length === 0){ listArea.innerHTML = "<p>全問正解！天才だにゃ🎊</p>"; }
    else {
        wrongList.forEach((q) => {
            listArea.innerHTML += `<div class="review-item"><strong>問: ${q.q}</strong><br><span style='color:#ef4444;'>❌ 正解: ${q.a[q.c]}</span><br><small>💡 ${q.d}</small></div>`;
        });
    }
    window.scrollTo(0,0);
}

function retryWrong(){ if(wrongList.length>0){ currentQuiz=JSON.parse(JSON.stringify(wrongList)); currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false); timeLeft=3600; document.getElementById("final-screen").style.display="none"; document.getElementById("game-screen").style.display="block"; startTimer(); show(); } }
function retryFlagged(){ let list=currentQuiz.filter((_,i)=>flagged[i]); if(list.length>0){ currentQuiz=JSON.parse(JSON.stringify(list)); currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false); timeLeft=3600; document.getElementById("final-screen").style.display="none"; document.getElementById("game-screen").style.display="block"; startTimer(); show(); } }
function retryAll(){ location.reload(); }

function showCheat() {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("cheat-screen").style.display = "block";
  window.scrollTo(0,0);

  const list = document.getElementById("cheat-list");
  list.innerHTML = "";
  cheatData.forEach(cat => {
    list.innerHTML += `<div style="color:#fbbf24; font-size:22px; font-weight:bold; margin:24px 0 12px;">${cat.cat}</div>`;
    cat.items.forEach(item => {
      list.innerHTML += `
        <div onclick="this.querySelector('.desc').style.display=this.querySelector('.desc').style.display==='none'?'block':'none'"
             style="background:#1e293b; border-radius:10px; padding:18px 16px; margin-bottom:10px; cursor:pointer;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
            <span style="color:#f1f5f9; font-weight:bold; font-size:22px;">${item.term}</span>
            <span style="color:#60a5fa; font-size:17px;">${item.read}</span>
          </div>
          <div class="desc" style="display:none; margin-top:12px; color:#ffffff; font-size:20px; line-height:1.7;">${item.desc}</div>
        </div>`;
    });
  });
}

function hideCheat() {
  document.getElementById("cheat-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "block";
  window.scrollTo(0,0);
}
