<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIパスポート最強アプリ【決定版】</title>
<style>
/* Mahito専用：フォントサイズは変更せず、見やすさ重視 */
body { font-family:sans-serif; background:#f4f7f6; padding:15px; margin:0; font-size: 22px; }
.container { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
h2 { font-size:26px; color:#1e293b; border-left:12px solid #2563eb; padding-left:15px; }
.menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.menu button { background:#111827; color:#fff; font-size:16px; padding:12px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; }
#flagBtn { background:#f59e0b; color:#fff; margin-bottom: 15px; padding:20px; font-size:22px; border-radius:12px; border:none; width:100%; font-weight:bold; cursor:pointer; }
.is-flagged { background:#ef4444 !important; }
#question { font-size:26px; font-weight:bold; margin:20px 0; background:#f8f9fa; padding:20px; border-radius:12px; border:1px solid #e2e8f0; }
button.choice { padding:22px; margin:10px 0; width:100%; border-radius:15px; border:2px solid #cbd5e1; background:#fff; font-size:22px; font-weight:bold; text-align:left; cursor:pointer; }
.correct { background:#d1fae5 !important; border-color:#10b981 !important; color:#064e3b; }
.wrong { background:#fee2e2 !important; border-color:#ef4444 !important; color:#7f1d1d; }
#result { margin-top:15px; font-weight:bold; font-size:22px; padding:15px; border-radius:10px; display:none; border:2px solid #ddd; }
#nextBtn { background:#2563eb; color:#fff; padding:22px; font-size:24px; width:100%; border:none; border-radius:15px; font-weight:bold; cursor:pointer; display:none; margin-top:20px; }
#final-screen { display:none; text-align: center; }
.review-box { text-align: left; background: #fff1f2; padding: 15px; margin-top: 20px; border-radius: 10px; border-left: 8px solid #ef4444; }
.review-item { margin-bottom: 20px; border-bottom: 1px solid #fda4af; padding-bottom: 10px; font-size: 18px; }

/* ===== 表紙（スタート画面）専用CSS ===== */
#start-screen {
  display: block;
  max-width: 700px;
  margin: auto;
  text-align: center;
  background: #0f172a;
  border-radius: 20px;
  padding: 30px 20px 40px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
#start-screen .cover-title {
  color: #f1f5f9;
  font-size: 18px;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  opacity: 0.7;
}
#start-screen .cover-image-wrapper {
  background: linear-gradient(135deg, #1e3a5f, #0f172a);
  border: 3px solid #ef4444;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: 0 0 30px rgba(239,68,68,0.35);
}
#start-screen .cover-image-wrapper img {
  width: 100%;
  max-width: 520px;
  height: auto;
  border-radius: 10px;
  display: block;
  margin: auto;
}
/* 画像がない場合の代替表示 */
#start-screen .cover-fallback {
  padding: 30px 10px;
  color: #f1f5f9;
}
#start-screen .cover-fallback .big-title {
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #fbbf24;
}
#start-screen .cover-fallback .sub {
  font-size: 18px;
  color: #94a3b8;
}
#start-btn {
  display: block;
  width: 90%;
  max-width: 420px;
  margin: 0 auto 16px;
  padding: 24px;
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #ef4444, #f59e0b);
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(239,68,68,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
#start-btn:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(239,68,68,0.6); }
#start-btn:active { transform: scale(0.97); }
#start-screen .edition-note {
  color: #64748b;
  font-size: 16px;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- ===== 表紙（スタート画面）===== -->
<div id="start-screen">
  <p class="cover-title">Mahito's Edition 2026</p>
  <div class="cover-image-wrapper">
    <!-- 画像ファイルをGitHubに置いていない場合は下の fallback が表示されます -->
    <img src="image_0aff13.png" alt="AIパスポート模試" 
         onerror="this.style.display='none'; document.getElementById('cover-fallback').style.display='block';">
    <div id="cover-fallback" class="cover-fallback" style="display:none;">
      <div class="big-title">🐱 生成AIパスポート</div>
      <div class="big-title">実戦模試 60問</div>
      <div class="sub">2026年新シラバス対応 ／ 4択形式</div>
    </div>
  </div>
  <button id="start-btn" onclick="startQuiz()">🐱 練習問題をはじめる</button>
  <p class="edition-note">全60問 ／ 試験時間60分 ／ キジトラ応援団🐈</p>
  <div style="margin-top:20px; background:#1e293b; border-radius:12px; padding:16px 20px; text-align:left; font-size:16px; color:#cbd5e1; line-height:2.0;">
    <div style="color:#fbbf24; font-weight:bold; font-size:17px; margin-bottom:8px;">📋 生成AIパスポート試験について</div>
    🎯 対象：AI・生成AIに興味のある方ならどなたでも受験OK<br>
    🖥️ 形式：オンライン（IBT方式）／ 60分・60問<br>
    💴 受験料：一般 11,000円 ／ 学生 5,500円（税込）<br>
    📅 年5回開催（2・4・6・8・10月）<br>
    　　<span style="font-size:14px; color:#94a3b8;">申込は受験月の前月末まで</span><br>
    🔗 申込・詳細：<a href="https://guga.or.jp" target="_blank" style="color:#60a5fa;">guga.or.jp</a>
  </div>
</div>

<!-- ===== クイズ画面（元のコードそのまま）===== -->
<div id="game-screen" class="container" style="display:none;">
    <h2>AIパスポート実戦</h2>
    <div class="menu">
        <button onclick="retryWrong()">❌ミス</button>
        <button onclick="retryFlagged()">🚩フラグ</button>
        <button onclick="retryAll()">🔄リセット</button>
    </div>
    <div id="progress" style="font-weight:bold; color:#64748b;"></div>
    <div id="timer" style="font-weight:bold; color:#ef4444; font-size:22px; margin-bottom:15px;"></div>
    <button id="flagBtn" onclick="toggleFlag()">★ フラグを立てる</button>
    <div id="question"></div>
    <div id="answers"></div>
    <div id="result"></div>
    <button id="nextBtn" onclick="next()">次の問題へ ➔</button>
</div>

<div id="final-screen" class="container">
    <h2>試験結果発表</h2>
    <div id="final-score" style="font-size:60px; font-weight:bold; color:#2563eb;"></div>
    <div id="judgement" style="margin:15px auto; max-width:500px; padding:20px; border-radius:12px; font-size:22px; font-weight:bold;"></div>
    <div id="review-area" class="review-box">
        <h3>📋 復習リスト（間違えた問題）</h3>
        <div id="review-list"></div>
    </div>
    <button onclick="retryAll()" style="background:#27ae60; color:#fff; padding:25px; width:100%; border:none; border-radius:15px; font-weight:bold; font-size:22px; cursor:pointer; margin-top:30px;">🔄 最初からやり直す</button>
</div>

<script>
const quizData = [
    {q:"LLMが文章を処理する際の最小単位は？",a:["トークン","ビット","パケット","セグメント"],c:0,
     d:"「トークン」はAIが言葉を理解するための最小のかけら。「東京」は1〜2トークン。日本語は英語より多く分割されやすく、APIコストに直結するにゃ。"},
    {q:"AIが事実と異なる嘘を自信満々につく現象は？",a:["ハルシネーション","バイアス","過学習","ドリフト"],c:0,
     d:"「ハルシネーション（幻覚）」はAIが存在しない論文や事実を作り上げる現象。自信満々に嘘をつくのが厄介。重要な情報は必ず別の方法で裏取りするにゃ。"},
    {q:"最新情報を検索し回答に組み込む技術は？",a:["RAG","蒸留","量子化","LoRA"],c:0,
     d:"「RAG（検索拡張生成）」は回答前に外部DBやネットを調べて見ながら答える仕組み。試験中に参考書を持ち込める状態にするイメージ。ハルシネーション対策にも有効にゃ。"},
    {q:"指示文で『一歩ずつ順を追って考えて』と促す手法は？",a:["Chain of Thought","Few-shot","Zero-shot","RAG"],c:0,
     d:"「Chain of Thought（思考の連鎖）」はAIに答えを出す前に思考過程を書かせる手法。「一歩ずつ考えて」と一言添えるだけで複雑な推論の正解率が大幅に上がることが実験で証明されているにゃ。"},
    {q:"AI学習に著作物を許諾なく利用できる日本の法律は？",a:["著作権法30条の4","個人情報保護法","特許法","独禁法"],c:0,
     d:"「著作権法第30条の4」はAI学習目的に限り著作物を自由に使えるという世界でも珍しいルール。ただし学習に使えるだけで、生成した内容での著作権侵害は別問題にゃ。試験最頻出の条文にゃ。"},
    {q:"並列計算が得意なAIの心臓部となる半導体は？",a:["GPU","CPU","SSD","RAM"],c:0,
     d:"「GPU」はゲームの映像処理用に作られたが、AI学習に必要な大量の並列計算が得意。CPUが「賢い一人の職人」ならGPUは「何千人も同時に働く工場」のイメージ。NVIDIAが業界を席巻しているのはこのためにゃ。"},
    {q:"AIの判断理由を可視化し、説明可能にする技術は？",a:["XAI","RPA","IoT","API"],c:0,
     d:"「XAI（説明可能なAI）」はAIのブラックボックスを開けて「なぜこう判断したか」を人間に見せる技術。医療・金融など誤判断が命取りになる場面で特に重視される。「なんとなく正解」ではいけない分野で必須にゃ。"},
    {q:"AIモデルの数値を丸めて軽量化する技術は？",a:["量子化","蒸留","スケーリング","バイアス"],c:0,
     d:"「量子化」は32ビットの数値を8ビットや4ビットに圧縮してモデルを軽くする技術。画像の解像度を下げるイメージ。精度を少し犠牲にする代わりにスマホやPCでも大型モデルが動くようになるにゃ。"},
    {q:"ITを使って社会や生活を根本から変革することを？",a:["DX","RPA","API","RAG"],c:0,
     d:"「DX（デジタルトランスフォーメーション）」は単なるデジタル化ではなく、ビジネスモデルや業務プロセス・組織文化まで根本から変えること。AI導入はDXの手段の一つにゃ。"},
    {q:"AIの学習データに『正解』を教えるタグ付け作業は？",a:["アノテーション","スクレイピング","デバッグ","量子化"],c:0,
     d:"「アノテーション」はAI用の教材に「これは猫」「この文章はポジティブ」などと正解ラベルを付ける作業。AIの精度はアノテーションの質と量に大きく左右される。地道だが非常に重要な工程にゃ。"},
    {q:"ネットを介さず端末内で動く高速なAIは？",a:["エッジAI","クラウドAI","集中型AI","ビッグデータ"],c:0,
     d:"「エッジAI」はスマホや車載機器など端末（エッジ）の中でAIを動かす仕組み。クラウドに送らないのでリアルタイム処理が得意でプライバシーも守りやすい。自動運転やスマートカメラに使われているにゃ。"},
    {q:"EUのAI法で、最悪なリスクのAIに対する扱いは？",a:["禁止","高リスク","限定的","自由"],c:0,
     d:"EUのAI法はリスクを4段階に分類。最上位「容認できないリスク」（社会的スコアリング・潜在意識への操作など）は全面禁止。次の「高リスク」（医療・採用など）は厳格な規制対象。世界初の法的拘束力を持つAI規制にゃ。"},
    {q:"回答構成を『要点・理由・具体例・要点』にする手法は？",a:["PREP法","DESC法","5W1H","SWOT"],c:0,
     d:"「PREP法」はPoint（結論）→Reason（理由）→Example（具体例）→Point（再び結論）の順に伝える手法。AIへのプロンプトでもこの順番で書くと欲しい答えが返ってきやすい。プレゼンや文章作成にも使える万能フォーマットにゃ。"},
    {q:"AIが書いた文章かどうかを見破るツールは？",a:["AIディテクター","AIエディタ","AIコンパイラ","AIバッファ"],c:0,
     d:"「AIディテクター」はAIが生成したテキスト・画像・音声を見分けるツール。教育機関でのAI使用不正を検知したり偽情報の拡散防止に使われる。ただし完璧ではなく誤検知・見逃しもあるため補助的ツールとして使うにゃ。"},
    {q:"モデルが巨大化すると急に能力が開花する現象は？",a:["創発","蒸留","量子化","ドリフト"],c:0,
     d:"「創発（Emergence）」は量が質に変わる瞬間のこと。水が100℃で突然気体になるように、AIも学習データが一定量を超えると突然「翻訳できる」「コードが書ける」などの能力が現れる。GPT-3→4で見られた現象にゃ。"},
    {q:"画像から文字を読み取ってデータ化する技術は？",a:["OCR","RPA","API","URL"],c:0,
     d:"「OCR（光学文字認識）」はスキャンした紙の書類や画像に含まれる文字を認識してテキストデータに変換する技術。紙の帳票をAIに読み込ませる際の入口として重要。最近はAIと組み合わせて手書き文字の認識精度も向上しているにゃ。"},
    {q:"AIの回答が時間の経過とともに劣化する現象は？",a:["モデルドリフト","創発","蒸留","量子化"],c:0,
     d:"「モデルドリフト」は世の中の変化にAIの知識がついていけず精度が下がる現象。学習時と現実のデータの分布がズレていくイメージ。定期的な再学習やRAGとの組み合わせが対策になるにゃ。"},
    {q:"AIの学習データに嘘を混ぜて狂わせる攻撃は？",a:["データポイズニング","フィッシング","スパム","ウイルス"],c:0,
     d:"「データポイズニング（毒入れ攻撃）」はAIの教科書（学習データ）に嘘の情報を混ぜてAIを狂わせる攻撃。「このウイルスは安全」と誤学習させると検知AIが機能しなくなる。学習データの品質管理が防衛策にゃ。"},
    {q:"AIと一緒に新しい価値を作る姿勢は？",a:["AI共生","AI独占","AI排除","AI放棄"],c:0,
     d:"「AI共生（Human-AI Collaboration）」はAIを敵対・依存の対象にせず人間の能力を拡張するパートナーとして捉える考え方。AIが得意な大量処理と人間が得意な創造性・倫理判断を組み合わせる姿勢にゃ。"},
    {q:"機密情報を入力する際、学習されないように結ぶ契約は？",a:["NDA(秘密保持契約)","PL法","特許","商標"],c:0,
     d:"「NDA（Non-Disclosure Agreement）」は業務上の秘密を第三者に漏らさないよう取り決める契約。AIベンダーとNDAを締結してエンタープライズプランを利用するのが、企業が安全にAIを活用するための基本的な手段にゃ。"},
    {q:"大規模モデルを再学習せず効率的に追加学習する手法は？",a:["LoRA","NLP","OCR","GAN"],c:0,
     d:"「LoRA（Low-Rank Adaptation）」は巨大なAIモデル全体を書き換えず、薄い「アダプター層」だけを学習させる省エネ手法。元のモデルはそのままで特定の絵柄や文体だけ後付けで覚えさせられる。費用と時間を大幅に節約できるにゃ。"},
    {q:"AIの回答を人間が評価して調整する手法は？",a:["RLHF","教師なし学習","蒸留","量子化"],c:0,
     d:"「RLHF（人間フィードバックによる強化学習）」はAIの回答を人間が評価し、その評価を学習報酬として活用する手法。ChatGPTが有害な返答を避けるよう訓練されているのもこの仕組みにゃ。"},
    {q:"AIの開発初期から安全性を組み込む考え方は？",a:["セーフティ・バイ・デザイン","スピード第一","低コスト","後付け"],c:0,
     d:"「セーフティ・バイ・デザイン」は問題が起きてから対処するのではなく最初の設計段階から安全を組み込む考え方。ヘルメットを事故の後に配るのではなく最初から全員に配るイメージ。EU AI法やAI事業者ガイドラインでも重視されるにゃ。"},
    {q:"人間が最終判断の輪に入る考え方は？",a:["ヒューマン・イン・ザ・ループ","フルオート","AI・バイ","デバッグ"],c:0,
     d:"「ヒューマン・イン・ザ・ループ」はAIに全部任せず要所で人間が確認・修正・承認するプロセス設計。AIは処理速度・量が強みだが最終的な判断責任は人間にある。医療診断や採用選考などで特に重視されるにゃ。"},
    {q:"AIが書いたコードの弱点を何と呼ぶ？",a:["脆弱性","バグ","スパム","仕様"],c:0,
     d:"「脆弱性」はAIが生成したコードに含まれる悪意ある人に悪用されうる「抜け穴」のこと。一見正しく見えても脆弱性を含む場合がある。コードレビューや自動セキュリティ診断ツールと組み合わせて人間が最終確認することが重要にゃ。"},
    {q:"AIの導入で業務を根本から見直すのは？",a:["BPR","URL","PDF","USB"],c:0,
     d:"「BPR（ビジネスプロセス・リエンジニアリング）」は業務プロセスを根本から再設計すること。AI導入時に「今までの手順をそのまま自動化する」のではなく、AI前提で最適な仕組みに作り直すことが本来のDXにゃ。"},
    {q:"AIを使いこなすための教養や能力は？",a:["AIリテラシー","タイピング","プログラミング","ハード構成"],c:0,
     d:"「AIリテラシー」はAIの仕組み・限界・リスクを理解した上で賢く使うスキル。生成AIパスポート試験そのものがこのリテラシー向上を目的としている。ハルシネーションを疑える批判的思考も含まれるにゃ。"},
    {q:"指示文で『〜はしないで』と禁止するのは？",a:["ネガティブプロンプト","システム","ロール","Few-shot"],c:0,
     d:"「ネガティブプロンプト」は「〜は出力しないで」「〜は描かないで」と明示的に禁止する指示。画像生成AIでは特に有効で不要な要素を除くことで品質が大きく向上する。指示するだけでなく禁止事項も指定するのがプロンプトの基本にゃ。"},
    {q:"情報の出所（ソース）を明確に示す性質は？",a:["透明性","機密性","匿名性","独占性"],c:0,
     d:"「透明性」はAIがどう動いているか・何を根拠に判断しているかを隠さず説明する原則。2024年4月公表のAI事業者ガイドラインでも重視される。利用者が「なぜこの結果?」と疑問を持った時に答えを得られる状態にするのが目標にゃ。"},
    {q:"AIで他人の声を合成する犯罪は？",a:["ボイスクローン詐欺","フィッシング","バグ","スパム"],c:0,
     d:"「ボイスクローン詐欺」はAIで声をコピーして「息子だけど事故に遭った、すぐ送金して」などと騙す手口。数秒の音声サンプルがあれば合成できるためSNSに音声を上げることに注意が必要にゃ。"},
    {q:"回答例を1つだけ見せる手法は？",a:["One-shot","Zero-shot","Few-shot","Multi-shot"],c:0,
     d:"「One-shot（ワンショット）」は例を1つだけ見せてから解かせる手法。例が0個はZero-shot、2〜数個はFew-shot。例の数が増えるほどAIは期待する形式・スタイルを理解しやすくなるにゃ。"},
    {q:"著作権侵害で『元ネタに似ていること』を指すのは？",a:["類似性","依拠性","正確性","迅速性"],c:0,

     d:"私（ジェミー）と一緒に毎日少しずつ積み上げることにゃ！マーニャとアイも応援してるにゃ🐈🐈‍⬛ 4月の本番、絶対合格するにゃ🎌"}

let currentQuiz=[], currentIndex=0, score=0, wrongList=[], flagged=[], timeLeft=3600, timer;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

// 表紙からクイズへ
function startQuiz() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    init();
}

function init(){
    localStorage.clear();
    currentQuiz=JSON.parse(JSON.stringify(quizData));
    shuffle(currentQuiz);
    currentQuiz.forEach(q => { const cor=q.a[q.c]; shuffle(q.a); q.c=q.a.indexOf(cor); });
    currentIndex=0; score=0; wrongList=[]; flagged=new Array(currentQuiz.length).fill(false);
    startTimer(); show();
}

function startTimer(){ clearInterval(timer); timer=setInterval(()=>{ timeLeft--; let m=Math.floor(timeLeft/60); let s=timeLeft%60; document.getElementById("timer").textContent="残り："+m+"分"+(s<10?'0'+s:s)+"秒"; if(timeLeft<=0)finish(); },1000); }

function show(){
    document.getElementById("game-screen").style.display="block";
    document.getElementById("final-screen").style.display="none";
    const q=currentQuiz[currentIndex];
    document.getElementById("progress").textContent="問 "+(currentIndex+1)+" / 60";
    document.getElementById("question").textContent=q.q;
    const fb=document.getElementById("flagBtn");
    fb.textContent=flagged[currentIndex]?"🚩 フラグ解除":"★ フラグを立てる";
    fb.classList.toggle("is-flagged", flagged[currentIndex]);
    const area=document.getElementById("answers"); area.innerHTML="";
    q.a.forEach((text,i)=>{
        const btn=document.createElement("button"); btn.className="choice"; 
        btn.textContent=String.fromCharCode(65+i)+": "+text;
        btn.onclick=()=>check(i===q.c,btn,q); area.appendChild(btn);
    });
    document.getElementById("result").style.display="none"; document.getElementById("nextBtn").style.display="none";
}

function toggleFlag(){ flagged[currentIndex]=!flagged[currentIndex]; show(); }

function check(ok,btn,q){
    const btns = document.querySelectorAll(".choice");
    btns.forEach(b=>b.disabled=true);
    const res=document.getElementById("result"); res.style.display="block";
    btns[q.c].classList.add("correct"); 
    if(ok){
        res.innerHTML="✅ 正解だにゃ！<br><small>"+q.d+"</small>";
        res.style.backgroundColor="#d1fae5";
        score++;
    }else{
        btn.classList.add("wrong");
        res.innerHTML="❌ 不正解...正解は: "+q.a[q.c]+"<br><small>"+q.d+"</small>";
        res.style.backgroundColor="#fee2e2";
        wrongList.push(q);
    }
    document.getElementById("nextBtn").style.display="block";
}

function next(){ currentIndex++; if(currentIndex<currentQuiz.length){ show(); window.scrollTo(0,0); } else { finish(); } }

function finish(){
    clearInterval(timer);
    document.getElementById("game-screen").style.display="none";
    document.getElementById("final-screen").style.display="block";
    document.getElementById("final-score").textContent = score + " / 60";
    const pct = Math.round(score / 60 * 100);
    const judgement = document.getElementById("judgement");
    if (score >= 48) {
        judgement.innerHTML = "🎉 合格圏内！（正答率" + pct + "%）<br><small style='font-size:16px;'>目安：80%以上（48問）で合格圏内 ※公式非公開</small>";
        judgement.style.background = "#d1fae5";
        judgement.style.color = "#064e3b";
        judgement.style.border = "3px solid #10b981";
    } else {
        judgement.innerHTML = "📝 もう少し！（正答率" + pct + "%）<br><small style='font-size:16px;'>目安：80%以上（48問）で合格圏内 ※公式非公開</small>";
        judgement.style.background = "#fff1f2";
        judgement.style.color = "#7f1d1d";
        judgement.style.border = "3px solid #ef4444";
    }
    const listArea = document.getElementById("review-list");
    listArea.innerHTML = "";
    if(wrongList.length === 0){ listArea.innerHTML = "<p>全問正解！天才だにゃ🎊</p>"; }
    else {
        wrongList.forEach((q) => {
            listArea.innerHTML += `<div class="review-item"><strong>問: ${q.q}</strong><br><span style='color:#ef4444;'>❌ 正解: ${q.a[q.c]}</span><br><small>💡 ${q.d}</small></div>`;
        });
    }
    window.scrollTo(0,0);
}

function retryWrong(){ if(wrongList.length>0){ currentQuiz=JSON.parse(JSON.stringify(wrongList)); currentIndex=0; score=0; wrongList=[]; show(); } }
function retryFlagged(){ let list=currentQuiz.filter((_,i)=>flagged[i]); if(list.length>0){ currentQuiz=JSON.parse(JSON.stringify(list)); currentIndex=0; score=0; wrongList=[]; show(); } }
function retryAll(){ location.reload(); }
</script>
