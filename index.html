<html lang="ja"><head>
<meta charset="UTF-8">
<title>AIパスポートアプリ</title>
<style>
body{font-family:sans-serif;text-align:center;padding:40px;}
button{margin:10px;padding:15px 20px;font-size:16px;border:none;border-radius:10px;cursor:pointer;}
</style>
</head>
<body>

<h1>AIパスポートアプリ</h1>

<h2>🛠 ダウンロード機能</h2>

<button onclick="downloadPublic()">📦 公開版をDL</button>
<button onclick="downloadWork()">🧪 作業版をDL</button>

<script>
function downloadPublic(){
  const content = document.documentElement.outerHTML;
  const blob = new Blob([content], {type: "text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "index_public.html";
  a.click();
}

function downloadWork(){
  const content = `<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>作業版</title></head>
<body>
<h1>作業版（60問編集）</h1>
<script>
const mainQuestions = [];
const holdQuestions = [];
const restoredQuestions = holdQuestions.filter(q => q.status === "ready");
const quizData = [...mainQuestions, ...restoredQuestions];
<\/script>
</body>
</html>`;
  const blob = new Blob([content], {type: "text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "index_work.html";
  a.click();
}
</script>



</body></html>
