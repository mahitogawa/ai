<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIパスポート対策・AI先生版</title>
</head>
<body>
    <h1>AIパスポート対策アプリ</h1>
    <p id="question">問題：ITパスポート試験で「情報の機密性」を守るとはどういうこと？</p>
    
    <button id="aiBtn" onclick="askAI()">🤖 AI先生に解説を聞く</button>

    <div id="ai-response" style="margin-top:20px; padding:15px; background:#e7f3ff; border-radius:10px;">
        <strong>AI先生の回答：</strong>
        <p id="response-text">「解説を聞く」を押してね</p>
    </div>

    <script type="module">
        // 1. 【ここが重要！】最新のライブラリ（住所）に変更しました
        import { GoogleGenerativeAI } from "https://cdn.jsdelivr.net/npm/@google/generative-ai/+esm";

        // 2. Mahitoさんの最新APIキーです
        const API_KEY = "AIzaSyB384rT6-nc0rgt_v0ULI8ewFODF-BKLak";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.askAI = async function() {
            const responseText = document.getElementById("response-text");
            const questionText = document.getElementById("question").innerText;
            
            responseText.innerText = "マーニャちゃんとアイちゃんも見守ってるよ！AI先生が考え中...";
            
            try {
                // 3. モデル名を「gemini-1.5-flash」に固定します
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = questionText + " この問題を、中学生でもわかる「日常の例え話」で3行以内で解説して。最後にMahitoさんを応援して。";
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                responseText.innerText = response.text();
            } catch (error) {
                console.error(error);
                responseText.innerText = "エラーが出ちゃった。APIキーの権限設定か、ネットの接続を確認してみてにゃ。";
            }
        }
    </script>
</body>
</html>
