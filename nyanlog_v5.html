<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>🐱 にゃんログ v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#12364a;
  --ok:#1d9e75;
  --ok-bg:#e7f7ef;
  --ng:#ef4444;
  --ng-bg:#fee2e2;
  --line:#d1d5db;
  --sub:#6b7280;
  --ink:#1f2937;
  --msg-bg:#f3f7fa;
  --sun:#ff6b6b;
  --sat:#4dabf7;
  --warn:#f59e0b;
  --warn-bg:#fff7e6;
}

/* フォント完全統一 */
html, body, button, textarea, input, select, option, .label, .tab, .comment-card, .stat-label, .stat-value {
  font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", -apple-system, BlinkMacSystemFont, sans-serif !important;
}

body{
  background:linear-gradient(180deg,#f3f6f8 0%,#e8edf1 100%);
  color:var(--ink);
  padding:18px 12px 40px;
  min-height:100vh;
  font-size:20px;
}

.shell{
  max-width:980px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
  align-items:start;
}

.phone{
  width:100%;
  max-width:430px;
  margin:0 auto;
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  border:1px solid #dde3e8;
  box-shadow:0 16px 42px rgba(18,54,74,.12);
}

.side{
  display:none;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(8px);
  border:1px solid #dde3e8;
  border-radius:22px;
  padding:18px;
  box-shadow:0 10px 28px rgba(18,54,74,.08);
}

.top{
  background:var(--brand);
  color:#fff;
  padding:18px 16px;
}
.top-title{
  font-size:20px;
  font-weight:900;
  letter-spacing:.02em;
}
.top-date{
  font-size:32px;
  font-weight:900;
  margin-top:6px;
  line-height:1.2;
}
.top-date.sun{color:var(--sun)}
.top-date.sat{color:var(--sat)}
.top-date.week{color:#fff}

.section{padding:16px 14px 0}

.label{
  font-size:20px;
  color:#0f172a;
  font-weight:900;
  letter-spacing:.04em;
  margin-bottom:14px;
  line-height:1.4;
}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.state-good{background:#e6f7ef;border-color:var(--ok);color:#0f6e56}
.state-warn{background:var(--warn-bg);border-color:var(--warn);color:#92400e}
.state-bad{background:var(--ng-bg);border-color:var(--ng);color:#7f1d1d}

.btn{
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  min-height:64px;
  padding:12px 8px;
  font-size:19px;
  font-weight:900;
  color:#1f2937;
  cursor:pointer;
  transition:.15s ease;
  line-height:1.35;
  letter-spacing:.01em;
}
.btn:active{transform:scale(.98)}
.btn.active{outline:2px solid rgba(18,54,74,.18)}
.drug-yes.active{background:var(--ok-bg);border-color:var(--ok);color:#0f6e56}
.drug-no.active{background:var(--ng-bg);border-color:var(--ng);color:#b91c1c;animation:pulse-red 1.2s ease-in-out 3}
@keyframes pulse-red{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
  50%{box-shadow:0 0 0 8px rgba(239,68,68,.28)}
}

.mood-row{display:flex;gap:8px}
.mood-btn{
  flex:1;
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  min-height:64px;
  font-size:19px;
  font-weight:900;
  cursor:pointer;
  transition:.15s;
  padding:10px 6px;
  letter-spacing:.01em;
}
.mood-btn.active{
  background:#eef0ff;
  border-color:#5b54c7;
  outline:2px solid rgba(91,84,199,.12);
}

textarea{
  width:100%;
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  font-size:19px;
  min-height:96px;
  resize:vertical;
  color:var(--ink);
  line-height:1.7;

  font-family:
    "Hiragino Sans",
    "Noto Sans JP",
    "Yu Gothic",
    "SF Pro Text",
    -apple-system,
    BlinkMacSystemFont,
    sans-serif !important;

  font-weight: 700;
  letter-spacing: 0.01em;
  -webkit-font-smoothing: antialiased;
}
textarea::placeholder{
  font-family: inherit;
  font-weight: 700;
}
textarea:focus{outline:none;border-color:var(--ok)}

.save-wrap{padding:16px 14px}
.save{
  width:100%;
  padding:18px;
  background:var(--brand);
  color:#fff;
  border:none;
  border-radius:16px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:.02em;
}

.tabs{
  display:flex;
  border-bottom:1px solid var(--line);
  margin:0 14px;
}
.tab{
  flex:1;
  padding:12px 4px;
  font-size:18px;
  font-weight:900;
  color:var(--sub);
  background:none;
  border:none;
  cursor:pointer;
  border-bottom:3px solid transparent;
  letter-spacing:.03em;
}
.tab.active{
  color:var(--brand);
  border-bottom-color:var(--brand);
}

.tab-panel{display:none;padding:14px}
.tab-panel.show{display:block}

.comment-card{
  background:var(--msg-bg);
  border:1px solid #dbe4ea;
  border-radius:16px;
  padding:16px;
  font-size:20px;
  line-height:1.8;
  font-weight:900;
  color:#0f172a;
  margin-bottom:12px;
  letter-spacing:.02em;
}
.comment-card.insight{
  background:#fff8e7;
  border-color:#f0c040;
}

.hist-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f8fafb;
  border:1px solid #e7ecef;
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:7px;
  font-size:15px;
  gap:10px;
}
.hist-day{
  font-weight:900;
  color:#24323d;
}
.hist-day.sun{color:var(--sun)}
.hist-day.sat{color:var(--sat)}
.hist-meta{
  color:#5b6975;
  font-weight:700;
  text-align:right;
  font-size:14px;
}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:#f8fafb;border:1px solid #e7ecef;border-radius:14px;padding:12px}
.stat-label{font-size:14px;color:var(--sub);font-weight:800}
.stat-value{font-size:26px;font-weight:900;margin-top:4px;color:#1d2a35}

.divider{height:1px;background:#f3f4f6;margin:12px 14px 0}
.pb{height:16px}

.stamp-overlay{
  position:fixed;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;
}
.stamp{
  font-size:64px;transform:scale(0.6) rotate(-10deg);opacity:0;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.2));
}
@keyframes popStamp{
  0%{opacity:0;transform:scale(0.6) rotate(-10deg)}
  40%{opacity:1;transform:scale(1.2) rotate(6deg)}
  70%{transform:scale(0.95) rotate(-4deg)}
  100%{opacity:0;transform:scale(1) rotate(0)}
}
@keyframes bgFlash{
  0%{background:rgba(18,54,74,0)}
  40%{background:rgba(18,54,74,0.12)}
  100%{background:rgba(18,54,74,0)}
}
.stamp-overlay.show{animation:bgFlash .8s ease}
.stamp-overlay.show .stamp{animation:popStamp .9s ease}

@media (min-width:860px){
  .shell{grid-template-columns:430px minmax(300px,1fr)}
  .phone{margin:0}
  .side{display:block}
}
@media (max-width:480px){
  body{padding:0;background:#dfe7ec}
  .phone{max-width:none;min-height:100vh;border-radius:0;border:none;box-shadow:none}
  .top-date{font-size:30px}
  .btn,.mood-btn{font-size:16px}
  .comment-card{font-size:17px}
}

/* ★ 選択状態 強化 */
.btn.active{
  background:#e6f7ef;
  border:2px solid #1d9e75;
  box-shadow:0 0 0 3px rgba(29,158,117,.15);
}
.state-bad.active{
  background:#fee2e2;
  border:2px solid #ef4444;
}
.state-warn.active{
  background:#fff7e6;
  border:2px solid #f59e0b;
}
.mood-btn.active{
  background:#eef0ff;
  border:2px solid #5b54c7;
  box-shadow:0 0 0 3px rgba(91,84,199,.12);
}

</style>
</head>
<body>
<div class="shell">
  <div class="phone">
    <div class="top">
      <div class="top-title">今日の記録 🐱</div>
      <div class="top-date" id="dateEl"></div>
    </div>

    <div class="section">
      <div class="label">💊 お薬</div>
      <div class="g2">
        <button class="btn drug-yes" id="medYes" type="button">✅ 飲んだ</button>
        <button class="btn drug-no" id="medNo" type="button">❌ 飲んでない</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="label">🍚 食事</div>
      <div class="g3">
        <button class="btn toggle" type="button">🌅 朝</button>
        <button class="btn toggle" type="button">🌞 昼</button>
        <button class="btn toggle" type="button">🌙 夜</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="label">🏃 体調・リハビリ</div>
      <div class="g3">
        <button class="btn toggle state-good" type="button">🚶 歩いた</button>
        <button class="btn toggle state-good" type="button">🏥 リハビリ</button>
        <button class="btn toggle state-good" type="button">😴 よく眠れた</button>
        <button class="btn toggle state-bad" type="button">⚡ 痛みあり</button>
        <button class="btn toggle" type="button">🚶‍♂️ 外出した</button>
        <button class="btn toggle state-warn" type="button">😵‍💫 疲れた</button>
        <button class="btn toggle" type="button">💧 水分とった</button>
        <button class="btn toggle" type="button">🚽 排便</button>
        <button class="btn toggle state-bad" type="button">😵 めまい</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="label">😊 気分</div>
      <div class="mood-row">
        <button class="mood-btn state-good" type="button" data-mood="元気">😄 元気</button>
        <button class="mood-btn active" type="button" data-mood="普通">😐 普通</button>
        <button class="mood-btn state-warn" type="button" data-mood="しんどい">😔 しんどい</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="label">📝 困りごと（自由入力）</div>
      <div class="g3" style="margin-bottom:0">
        <button class="btn trouble" type="button">🗣 言葉</button>
        <button class="btn trouble" type="button">🧠 記憶</button>
        <button class="btn trouble" type="button">🎯 集中</button>
        <button class="btn trouble" type="button">💭 気分</button>
        <button class="btn trouble state-warn" type="button">😓 疲れ</button>
        <button class="btn trouble state-bad" type="button">⚡ 痛み</button>
      </div>
      <textarea id="memo" placeholder="言葉が出にくかった、めまいがした…など自由に書くにゃ（任意）"></textarea>
    </div>

    <div class="save-wrap">
      <button class="save" id="saveBtn" type="button">記録する 🐾</button>
    </div>

    <div class="tabs">
      <button class="tab active" type="button" data-tab="cat">🐱 感想</button>
      <button class="tab" type="button" data-tab="eval">📊 評価</button>
      <button class="tab" type="button" data-tab="insight">🧠 気づき</button>
      <button class="tab" type="button" data-tab="hist">📅 履歴</button>
    </div>

    <div class="tab-panel show" id="tab-cat">
      <div class="comment-card" id="catMsg">今日はどうだったにゃ？ 記録すると、あなた向けのコメントを出すにゃ🐱</div>
    </div>

    <div class="tab-panel" id="tab-eval">
      <div class="comment-card" id="evalMsg">記録してから評価が出るにゃ📊</div>
      <div class="stats">
        <div class="stat"><div class="stat-label">服薬できた日</div><div class="stat-value" id="statDrug">－</div></div>
        <div class="stat"><div class="stat-label">リハビリした日</div><div class="stat-value" id="statRehab">－</div></div>
        <div class="stat"><div class="stat-label">歩いた日</div><div class="stat-value" id="statWalk">－</div></div>
        <div class="stat"><div class="stat-label">記録日数</div><div class="stat-value" id="statTotal">－</div></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-insight">
      <div class="comment-card insight" id="insightMsg">記録すると気づきが出るにゃ🧠</div>
    </div>

    <div class="tab-panel" id="tab-hist">
      <div id="histList"><div class="hist-item"><span class="hist-day">まだ履歴なし</span><span class="hist-meta">最初の1件を記録</span></div></div>
    </div>

    <div class="pb"></div>
  </div>

  <aside class="side">
    <div style="font-size:19px;font-weight:900;color:#12364a;margin-bottom:12px">🧠 気づき</div>
    <div class="comment-card insight" id="insightMsgSide">記録後にここにも表示されるにゃ</div>
    <div style="font-size:19px;font-weight:900;color:#12364a;margin:16px 0 12px">📊 1週間の評価</div>
    <div class="stats">
      <div class="stat"><div class="stat-label">服薬できた日</div><div class="stat-value" id="statDrug2">－</div></div>
      <div class="stat"><div class="stat-label">リハビリした日</div><div class="stat-value" id="statRehab2">－</div></div>
      <div class="stat"><div class="stat-label">歩いた日</div><div class="stat-value" id="statWalk2">－</div></div>
      <div class="stat"><div class="stat-label">記録日数</div><div class="stat-value" id="statTotal2">－</div></div>
    </div>
  </aside>
</div>

<div class="stamp-overlay" id="stampOverlay"><div class="stamp">🐾</div></div>

<script>
const KEY = 'nyanlog_dl_v1';
let medState = null;

function setDate(){
  const d = new Date();
  const week = ['日','月','火','水','木','金','土'];
  const el = document.getElementById('dateEl');
  el.textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${week[d.getDay()]}）`;
  el.className = 'top-date';
  if(d.getDay() === 0) el.classList.add('sun');
  else if(d.getDay() === 6) el.classList.add('sat');
  else el.classList.add('week');
}

function loadRecords(){
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
  catch(e){ return []; }
}
function saveRecords(records){
  localStorage.setItem(KEY, JSON.stringify(records));
}

function showTabById(id){
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  const tab = document.querySelector(`.tab[data-tab="${id}"]`);
  if(panel) panel.classList.add('show');
  if(tab) tab.classList.add('active');
}

function setupTabs(){
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => showTabById(tab.dataset.tab));
  });
}

function setMed(value){
  medState = value;
  document.getElementById('medYes').classList.toggle('active', value === 'yes');
  document.getElementById('medNo').classList.toggle('active', value === 'no');
}

function setupToggles(){
  document.querySelectorAll('.toggle, .trouble').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('active'));
  });

  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood-btn').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('medYes').addEventListener('click', () => setMed('yes'));
  document.getElementById('medNo').addEventListener('click', () => setMed('no'));
}

function getActiveTexts(selector){
  return [...document.querySelectorAll(selector + '.active')].map(el => el.dataset.mood || el.textContent.trim());
}

function getDayKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function buildComments(today, records){
  const week = records.slice(0, 7);
  const drugDays = week.filter(r => r.drug === 'yes').length;
  const rehabDays = week.filter(r => r.body.some(v => v.includes('リハビリ'))).length;
  const walkDays = week.filter(r => r.body.some(v => v.includes('歩いた'))).length;
  const tiredDays = week.filter(r => r.troubles.some(v => v.includes('疲れ')) || r.moodLabel === 'しんどい').length;
  const yesterday = records.find(r => r.dayKey !== today.dayKey);

  let cat = '';
  if(today.drug === 'no'){
    cat = yesterday && yesterday.drug === 'yes'
      ? '昨日は飲めていたけど、今日はお薬が飲めなかったにゃ。理由をメモしておくと振り返りに役立つにゃ💊'
      : '今日はお薬が飲めなかったにゃ。理由をメモしておくと振り返りに役立つにゃ💊';
  } else if(today.troubles.length > 0 && today.memo){
    cat = `今日は「${today.troubles.join('・')}」が気になって、メモも残せたにゃ。かなり大事な記録にゃ🐱`;
  } else if(today.troubles.length > 0){
    cat = `今日は「${today.troubles.join('・')}」が気になる日だったにゃ。流れが追いやすくなるにゃ🐱`;
  } else if(yesterday && yesterday.moodLabel && yesterday.moodLabel !== today.moodLabel){
    cat = `昨日は「${yesterday.moodLabel}」、今日は「${today.moodLabel}」にゃ。気分の変化も大事な記録にゃ🐱`;
  } else if(today.body.some(v => v.includes('リハビリ')) && today.body.some(v => v.includes('歩いた'))){
    cat = `今日はよく動けた日にゃ💪 直近7日でリハビリ${rehabDays}日・歩き${walkDays}日にゃ。`;
  } else if(tiredDays >= 3){
    cat = '最近、疲れやしんどさの日が続いてるにゃ。無理せず振り返りの材料にするにゃ🐱';
  } else if(drugDays >= 5){
    cat = `この1週間、服薬できた日が${drugDays}日あるにゃ。安定してきてるにゃ🐱`;
  } else {
    cat = '記録できたにゃ🐱 続けるだけで傾向が見えてくるにゃ。';
  }

  let evalMsg = '';
  if(records.length < 3){
    evalMsg = '3日以上記録すると、傾向のコメントが出やすくなるにゃ📊';
  } else if(drugDays <= 2){
    evalMsg = `服薬できた日が${drugDays}日/7日にゃ。少し少ないにゃ。次の振り返りポイントにするにゃ。`;
  } else if(rehabDays >= 4){
    evalMsg = `リハビリ継続率が高いにゃ（${rehabDays}日/7日）。この流れを維持したいにゃ💪`;
  } else {
    evalMsg = `服薬${drugDays}日・リハビリ${rehabDays}日・歩き${walkDays}日（直近7日）。安定した記録にゃ📊`;
  }

  let insight = '';
  const troubleText = today.troubles.join('・');
  if(today.drug === 'no'){
    insight = `【服薬】今日は未服薬。${today.memo ? 'メモ：' + today.memo : ''} 続くようなら原因の整理が必要かも。`;
  } else if(troubleText){
    insight = `【困りごと】${troubleText}${today.memo ? ' / ' + today.memo : ''} 変化が続くか見ると気づきにつながるにゃ。`;
  } else if(tiredDays >= 3){
    insight = `【疲れ傾向】直近7日で疲れ・しんどさの記録が${tiredDays}日。睡眠や予定の重さも一緒に見たいにゃ。`;
  } else {
    insight = `【概況】服薬OK・リハビリ${rehabDays}日/7日・歩行${walkDays}日/7日。生活リズムは安定寄りにゃ。`;
  }

  return { cat, evalMsg, insight };
}

function renderStats(records){
  const week = records.slice(0, 7);
  const drug = week.filter(r => r.drug === 'yes').length;
  const rehab = week.filter(r => r.body.some(v => v.includes('リハビリ'))).length;
  const walk = week.filter(r => r.body.some(v => v.includes('歩いた'))).length;
  const total = records.length;

  [['statDrug', drug], ['statDrug2', drug], ['statRehab', rehab], ['statRehab2', rehab], ['statWalk', walk], ['statWalk2', walk], ['statTotal', total], ['statTotal2', total]].forEach(([id, value]) => {
    const el = document.getElementById(id);
    if(el) el.textContent = value + '日';
  });
}

function renderHistory(){
  const records = loadRecords();
  renderStats(records);
  const list = document.getElementById('histList');
  if(records.length === 0){
    list.innerHTML = '<div class="hist-item"><span class="hist-day">まだ履歴なし</span><span class="hist-meta">最初の1件を記録</span></div>';
    return;
  }

  const weekNames = ['日','月','火','水','木','金','土'];
  list.innerHTML = records.slice(0, 7).map(r => {
    const dt = new Date(r.at);
    const day = dt.getDay();
    const dayClass = day === 0 ? 'sun' : day === 6 ? 'sat' : '';
    const label = `${dt.getMonth()+1}/${dt.getDate()}（${weekNames[day]}）`;
    const drug = r.drug === 'yes' ? '💊✅' : '💊❌';
    const meta = r.troubles.length ? r.troubles.join('・') : (r.moodLabel ? `気分:${r.moodLabel}` : '気分:未選択');
    return `<div class="hist-item"><span class="hist-day ${dayClass}">${label}</span><span class="hist-meta">${drug} ${meta}</span></div>`;
  }).join('');
}

function playStamp(){
  const ov = document.getElementById('stampOverlay');
  ov.classList.add('show');
  setTimeout(() => ov.classList.remove('show'), 900);
}

function saveRecord(){
  if(!medState){
    document.getElementById('catMsg').textContent = 'お薬の記録を選んでにゃ💊';
    showTabById('cat');
    return;
  }

  const now = new Date();
  const today = {
    at: now.toISOString(),
    dayKey: getDayKey(now),
    drug: medState,
    body: getActiveTexts('.toggle'),
    troubles: getActiveTexts('.trouble'),
    moodLabel: getActiveTexts('.mood-btn')[0] || '',
    memo: document.getElementById('memo').value.trim()
  };

  const records = loadRecords();
  const index = records.findIndex(r => r.dayKey === today.dayKey);
  if(index >= 0) records[index] = today;
  else records.unshift(today);

  records.sort((a, b) => new Date(b.at) - new Date(a.at));
  saveRecords(records);

  const comments = buildComments(today, records);
  document.getElementById('catMsg').textContent = comments.cat;
  document.getElementById('evalMsg').textContent = comments.evalMsg;
  document.getElementById('insightMsg').textContent = comments.insight;
  document.getElementById('insightMsgSide').textContent = comments.insight;

  renderHistory();
  showTabById('cat');
  playStamp();

  medState = null;
  document.getElementById('medYes').classList.remove('active');
  document.getElementById('medNo').classList.remove('active');
  document.querySelectorAll('.toggle, .trouble').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('memo').value = '';
}

setDate();
setupTabs();
setupToggles();
renderHistory();
document.getElementById('saveBtn').addEventListener('click', saveRecord);
</script>
</body>
</html>
